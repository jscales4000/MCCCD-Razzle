<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mockup 20 — Home: Glow Tiles</title>
<style>
  :root{
    --bg:#0d1b2e;--accent:#f5a623;--adim:rgba(245,166,35,.14);
    --success:#22c55e;--danger:#ef4444;
    --copy:#e2e8f0;--soft:#94a3b8;--muted:#64748b;
    --border:rgba(148,163,184,.15);--rad:16px;
    --panel:rgba(12,20,36,.97);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    width:1280px;height:800px;overflow:hidden;
    background:var(--bg);color:var(--copy);
    font-family:"Segoe UI",system-ui,sans-serif;
    display:grid;grid-template-rows:64px 1fr 84px;gap:12px;padding:12px;
  }
  body::before{content:'';position:fixed;top:-160px;left:50%;transform:translateX(-50%);width:1100px;height:560px;background:radial-gradient(ellipse,rgba(245,166,35,.07),transparent 70%);pointer-events:none;}

  /* HEADER */
  header{
    background:var(--panel);border:0.5px solid var(--border);border-radius:var(--rad);
    display:flex;align-items:center;padding:0 24px;gap:16px;
  }
  .room{font-size:36px;font-weight:900;letter-spacing:-.025em;}
  .badges{display:flex;gap:8px;align-items:center;}
  .small-badge{
    display:flex;align-items:center;gap:6px;padding:6px 11px;border-radius:14px;
    background:rgba(34,197,94,.08);border:0.5px solid rgba(34,197,94,.25);color:#86efac;
    font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  }
  .small-badge.occ{background:var(--adim);border-color:rgba(245,166,35,.3);color:var(--accent);}
  .pdot{width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 6px currentColor;animation:pulse 2.2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  .hsp{flex:1;}
  .nav-btn{
    display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px;
    background:rgba(13,27,46,.5);border:0.5px solid var(--border);color:var(--soft);
    font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;
    transition:all 110ms;
  }
  .nav-btn:hover{background:rgba(30,41,59,.6);color:var(--copy);border-color:rgba(148,163,184,.3);}

  /* BODY */
  .body-grid{display:flex;flex-direction:column;gap:14px;min-height:0;}
  .src-row{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;flex:1;}
  .glow-tile{
    background:var(--panel);border:0.5px solid var(--border);border-radius:var(--rad);
    display:flex;flex-direction:column;align-items:flex-start;justify-content:space-between;
    padding:26px 22px;gap:18px;cursor:pointer;position:relative;overflow:hidden;
    transition:all 220ms;
  }
  .glow-tile::before{
    content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;
    background:radial-gradient(circle,rgba(245,166,35,.10),transparent 65%);
    pointer-events:none;transition:all 220ms;
  }
  .glow-tile:hover{border-color:rgba(245,166,35,.3);transform:translateY(-2px);}
  .glow-tile:hover::before{background:radial-gradient(circle,rgba(245,166,35,.22),transparent 65%);}
  .gt-ico{color:var(--soft);transition:color 220ms;}
  .gt-name{font-size:26px;font-weight:800;letter-spacing:-.02em;color:var(--copy);}
  .gt-sub{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:4px;}
  .glow-tile.active{
    border:1px solid var(--accent);
    background:
      radial-gradient(circle at 70% 30%,rgba(245,166,35,.22),transparent 60%),
      var(--panel);
    box-shadow:0 0 0 1px rgba(245,166,35,.2),0 12px 36px rgba(245,166,35,.18);
  }
  .glow-tile.active::before{background:radial-gradient(circle,rgba(245,166,35,.35),transparent 60%);}
  .glow-tile.active .gt-ico,.glow-tile.active .gt-name{color:var(--accent);}

  .adv-row{display:flex;justify-content:flex-end;}
  .adv-chip{
    display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:8px;
    background:rgba(30,41,59,.5);border:0.5px solid var(--border);color:var(--soft);
    font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;
    transition:all 110ms;
  }
  .adv-chip:hover{background:rgba(245,166,35,.08);color:var(--accent);border-color:rgba(245,166,35,.25);}

  /* FOOTER */
  footer{
    background:var(--panel);border:0.5px solid var(--border);border-radius:var(--rad);
    display:grid;grid-template-columns:auto 1fr auto;align-items:center;padding:0 18px;gap:18px;
    position:relative;
  }
  .pwr-btn{
    display:flex;align-items:center;gap:10px;padding:10px 18px;border-radius:10px;
    background:rgba(245,166,35,.08);border:0.5px solid rgba(245,166,35,.35);color:var(--accent);
    font-size:13px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;
  }
  .mics{display:flex;align-items:center;gap:10px;justify-content:center;}
  .mic-lbl{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
  .mbtn{
    display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px;
    border:0.5px solid var(--border);background:rgba(13,27,46,.7);color:var(--soft);
    font-size:12px;font-weight:700;cursor:pointer;
  }
  .mbtn.live{color:#86efac;border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.08);}
  .vol-grp{display:flex;align-items:center;gap:14px;justify-self:end;}
  .vol-lbl{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
  .vbtn{
    display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;
    background:transparent;border:none;color:var(--soft);
    font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;
    transition:color 110ms;
  }
  .vbtn:hover{color:var(--accent);}

  /* VOLUME POPUP — visible */
  .vol-popup{
    position:absolute;bottom:calc(100% + 10px);right:18px;
    background:rgba(12,20,36,.99);border:1px solid rgba(245,166,35,.4);border-radius:12px;
    padding:14px 18px;display:flex;align-items:center;gap:14px;
    box-shadow:0 12px 30px rgba(0,0,0,.5),0 0 0 1px rgba(245,166,35,.1);
    min-width:340px;
  }
  .vp-ico{color:var(--accent);}
  .vp-meter{display:flex;gap:3px;flex:1;}
  .vp-seg{width:14px;height:18px;border-radius:2px;background:rgba(148,163,184,.15);}
  .vp-seg.on{background:var(--accent);box-shadow:0 0 6px rgba(245,166,35,.5);}
  .vp-val{font-size:18px;font-weight:900;color:var(--accent);min-width:48px;text-align:right;}

  .badge{position:fixed;top:14px;right:14px;z-index:99;background:rgba(245,166,35,.15);border:1px solid var(--accent);color:var(--accent);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;border-radius:6px;}
</style>
</head>
<body>

<header>
  <span class="room">AA140</span>
  <div class="badges">
    <span class="small-badge"><span class="pdot"></span>Online</span>
    <span class="small-badge occ"><span class="pdot"></span>Occupied</span>
  </div>
  <div class="hsp"></div>
  <button class="nav-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h4l2-2h4l2 2h4v12H4z"/><circle cx="12" cy="13" r="3.6"/></svg>
    Cameras
  </button>
  <button class="nav-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 1v3M12 20v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1 12h3M20 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>
    Settings
  </button>
</header>

<div class="body-grid">
  <div class="src-row">
    <button class="glow-tile">
      <svg class="gt-ico" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      <div>
        <div class="gt-name">Room PC</div>
        <div class="gt-sub">HDMI 1</div>
      </div>
    </button>
    <button class="glow-tile active">
      <svg class="gt-ico" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="4" width="18" height="12" rx="2"/><path d="M3 10h18M8 20h8M12 16v4"/></svg>
      <div>
        <div class="gt-name">Ext PC</div>
        <div class="gt-sub">HDMI 2 · Wallplate</div>
      </div>
    </button>
    <button class="glow-tile">
      <svg class="gt-ico" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
      <div>
        <div class="gt-name">AirMedia</div>
        <div class="gt-sub">Wireless BYOD</div>
      </div>
    </button>
    <button class="glow-tile">
      <svg class="gt-ico" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="4" width="20" height="13" rx="2"/><path d="M2 20h20"/></svg>
      <div>
        <div class="gt-name">Laptop</div>
        <div class="gt-sub">HDMI 3 · Podium</div>
      </div>
    </button>
  </div>
  <div class="adv-row">
    <button class="adv-chip">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Advanced Routing
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
    </button>
  </div>
</div>

<footer>
  <button class="pwr-btn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 3v9"/><path d="M6.5 7.5a8 8 0 1 0 11 0"/></svg>
    Power
  </button>
  <div class="mics">
    <span class="mic-lbl">Mics</span>
    <button class="mbtn live">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0014 0M12 19v3"/></svg>
      Lav
    </button>
    <button class="mbtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0014 0M12 19v3"/></svg>
      Handheld
    </button>
  </div>
  <div class="vol-grp">
    <span class="vol-lbl">Volume</span>
    <button class="vbtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4z" fill="currentColor"/><path d="M16 12h6"/></svg>
      Vol−
    </button>
    <button class="vbtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4z" fill="currentColor"/><path d="M16 9l6 6M22 9l-6 6"/></svg>
      Mute
    </button>
    <button class="vbtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4z" fill="currentColor"/><path d="M16 12h6M19 9v6"/></svg>
      Vol+
    </button>
  </div>

  <!-- VOLUME POPUP -->
  <div class="vol-popup">
    <svg class="vp-ico" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4z" fill="currentColor"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
    <div class="vp-meter">
      <span class="vp-seg on"></span><span class="vp-seg on"></span><span class="vp-seg on"></span>
      <span class="vp-seg on"></span><span class="vp-seg on"></span><span class="vp-seg on"></span>
      <span class="vp-seg on"></span><span class="vp-seg on"></span>
      <span class="vp-seg"></span><span class="vp-seg"></span><span class="vp-seg"></span><span class="vp-seg"></span>
    </div>
    <span class="vp-val">65%</span>
  </div>
</footer>

<div class="badge">Mockup 20 — Glow Tiles</div>
</body>
</html>
