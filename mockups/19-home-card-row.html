<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mockup 19 — Home: Card Row Classic</title>
<style>
  :root{
    --bg:#0d1b2e;--accent:#f5a623;--adim:rgba(245,166,35,.14);
    --success:#22c55e;--danger:#ef4444;
    --copy:#e2e8f0;--soft:#94a3b8;--muted:#64748b;
    --border:rgba(148,163,184,.15);--rad:14px;
    --panel:rgba(12,20,36,.97);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    width:1280px;height:800px;overflow:hidden;
    background:var(--bg);color:var(--copy);
    font-family:"Segoe UI",system-ui,sans-serif;
    display:grid;grid-template-rows:60px 1fr 88px;gap:10px;padding:10px;
  }
  body::before{content:'';position:fixed;top:-80px;left:50%;transform:translateX(-50%);width:800px;height:400px;background:radial-gradient(ellipse,rgba(245,166,35,.04),transparent 70%);pointer-events:none;}

  /* HEADER */
  header{
    background:var(--panel);border:0.5px solid var(--border);border-radius:var(--rad);
    display:flex;align-items:center;padding:0 22px;gap:14px;
  }
  .room{font-size:32px;font-weight:900;letter-spacing:-.02em;}
  .pill{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
  .pill-ok{background:rgba(34,197,94,.1);border:0.5px solid rgba(34,197,94,.25);color:#86efac;}
  .pill-occ{background:var(--adim);border:0.5px solid rgba(245,166,35,.35);color:var(--accent);}
  .pdot{width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 6px currentColor;animation:pulse 2.2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  .hsp{flex:1;}
  .nav-btn{
    display:flex;align-items:center;gap:8px;padding:9px 16px;border-radius:9px;
    background:transparent;border:0.5px solid var(--border);color:var(--soft);
    font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;
    transition:all 110ms;
  }
  .nav-btn:hover{background:rgba(255,255,255,.04);color:var(--copy);}

  /* BODY — card row */
  .body-grid{
    display:flex;flex-direction:column;gap:10px;min-height:0;
  }
  .src-row{
    display:grid;grid-template-columns:repeat(4,1fr);gap:14px;flex:1;
  }
  .src-card{
    background:var(--panel);border:0.5px solid var(--border);border-radius:var(--rad);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:14px;padding:20px;cursor:pointer;
    transition:all 180ms;position:relative;
  }
  .src-card:hover{background:rgba(30,41,59,.5);border-color:rgba(148,163,184,.3);}
  .src-card .ico{color:var(--soft);transition:color 180ms;}
  .src-name{font-size:24px;font-weight:800;letter-spacing:-.01em;color:var(--copy);}
  .src-sub{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
  .src-card.active{
    border-color:var(--accent);
    background:radial-gradient(ellipse at 50% 110%,rgba(245,166,35,.16),transparent 65%),var(--panel);
    box-shadow:0 0 0 1px rgba(245,166,35,.2),0 8px 28px rgba(245,166,35,.12);
  }
  .src-card.active .ico,.src-card.active .src-name{color:var(--accent);}
  .src-card.active::after{
    content:'';position:absolute;top:12px;right:12px;
    width:10px;height:10px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 10px rgba(245,166,35,.7);
  }
  .adv-row{display:flex;justify-content:flex-end;}
  .adv-chip{
    display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:8px;
    background:rgba(30,41,59,.5);border:0.5px solid var(--border);color:var(--soft);
    font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;
    transition:all 110ms;
  }
  .adv-chip:hover{background:rgba(245,166,35,.08);color:var(--accent);border-color:rgba(245,166,35,.25);}

  /* FOOTER */
  footer{
    background:var(--panel);border:0.5px solid var(--border);border-radius:var(--rad);
    display:grid;grid-template-columns:auto 1fr auto;align-items:center;padding:0 18px;gap:18px;
  }
  .pwr-btn{
    display:flex;align-items:center;gap:10px;padding:10px 18px;border-radius:10px;
    background:rgba(245,166,35,.08);border:0.5px solid rgba(245,166,35,.35);color:var(--accent);
    font-size:13px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;
    transition:all 110ms;
  }
  .pwr-btn:hover{background:rgba(245,166,35,.16);}
  .mics{display:flex;align-items:center;gap:10px;justify-content:center;}
  .mic-lbl{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
  .mbtn{
    display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px;
    border:0.5px solid var(--border);background:rgba(13,27,46,.7);color:var(--soft);
    font-size:12px;font-weight:700;cursor:pointer;transition:all 110ms;
  }
  .mbtn:hover{background:rgba(30,50,80,.7);color:var(--copy);}
  .mbtn.live{color:#86efac;border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.08);}
  .vol-grp{display:flex;align-items:center;gap:14px;justify-self:end;}
  .vol-lbl{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
  .vbtn{
    display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;
    background:transparent;border:none;color:var(--soft);
    font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;
    transition:all 110ms;
  }
  .vbtn:hover{color:var(--accent);}

  .badge{position:fixed;top:12px;right:12px;z-index:99;background:rgba(245,166,35,.15);border:1px solid var(--accent);color:var(--accent);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;border-radius:6px;}
</style>
</head>
<body>

<header>
  <span class="room">AA140</span>
  <div class="pill pill-ok"><span class="pdot"></span>Online</div>
  <div class="pill pill-occ"><span class="pdot"></span>Occupied</div>
  <div class="hsp"></div>
  <button class="nav-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h4l2-2h4l2 2h4v12H4z"/><circle cx="12" cy="13" r="3.6"/></svg>
    Cameras
  </button>
  <button class="nav-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="2.5"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 0 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
    Settings
  </button>
</header>

<div class="body-grid">
  <div class="src-row">
    <button class="src-card active">
      <svg class="ico" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      <div class="src-name">Room PC</div>
      <div class="src-sub">Built-in · HDMI 1</div>
    </button>
    <button class="src-card">
      <svg class="ico" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="4" width="18" height="12" rx="2"/><path d="M3 10h18M8 20h8M12 16v4"/></svg>
      <div class="src-name">Ext PC</div>
      <div class="src-sub">Wallplate · HDMI 2</div>
    </button>
    <button class="src-card">
      <svg class="ico" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
      <div class="src-name">AirMedia</div>
      <div class="src-sub">Wireless · BYOD</div>
    </button>
    <button class="src-card">
      <svg class="ico" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="4" width="20" height="13" rx="2"/><path d="M2 20h20"/></svg>
      <div class="src-name">Laptop</div>
      <div class="src-sub">Podium · HDMI 3</div>
    </button>
  </div>
  <div class="adv-row">
    <button class="adv-chip">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Advanced Routing
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
    </button>
  </div>
</div>

<footer>
  <button class="pwr-btn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 3v9"/><path d="M6.5 7.5a8 8 0 1 0 11 0"/></svg>
    Power
  </button>
  <div class="mics">
    <span class="mic-lbl">Mics</span>
    <button class="mbtn live">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0014 0M12 19v3"/></svg>
      Lav
    </button>
    <button class="mbtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0014 0M12 19v3"/></svg>
      Handheld
    </button>
  </div>
  <div class="vol-grp">
    <span class="vol-lbl">Volume</span>
    <button class="vbtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4z" fill="currentColor"/><path d="M16 12h6"/></svg>
      Vol−
    </button>
    <button class="vbtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4z" fill="currentColor"/><path d="M16 9l6 6M22 9l-6 6"/></svg>
      Mute
    </button>
    <button class="vbtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4z" fill="currentColor"/><path d="M16 12h6M19 9v6"/></svg>
      Vol+
    </button>
  </div>
</footer>

<div class="badge">Mockup 19 — Card Row</div>
</body>
</html>
