<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mockup 11 — MCCCD Orange Theme (Full Synthesis)</title>
<style>
  /* ── MCCCD Campus Orange Theme ──────────────────────────────────────────────
     Replicated from the existing MCCCD panel photographed in another campus room.
     Palette: amber #f5a623 accent on #0d1b2e navy. Same layout as Mockup 10. */
  :root{
    --bg:#0d1b2e;
    --accent:#f5a623;
    --adim:rgba(245,166,35,.14);
    --aborder:rgba(196,122,30,.40);
    --success:#22c55e;--danger:#ef4444;--warn:#fb923c;
    --copy:#e2e8f0;--muted:#4a5f72;--soft:#7a8fa0;
    --border:rgba(196,122,30,.22);
    --rad:14px;
    --panel:rgba(13,27,46,.97);
    --card:rgba(15,30,53,.95);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    width:1280px;height:800px;overflow:hidden;
    background:var(--bg);color:var(--copy);
    font-family:"Segoe UI",system-ui,sans-serif;
    display:grid;grid-template-columns:72px 1fr;
  }
  /* ambient warm glow */
  body::before{
    content:'';position:fixed;top:-150px;left:50%;transform:translateX(-50%);
    width:900px;height:500px;
    background:radial-gradient(ellipse,rgba(245,166,35,.06),transparent 70%);
    pointer-events:none;
  }

  /* ── RAIL ── */
  .rail{
    height:100%;background:rgba(9,18,32,.99);
    border-right:0.5px solid var(--border);
    display:flex;flex-direction:column;align-items:center;
    padding:18px 0;gap:4px;flex-shrink:0;position:relative;z-index:2;
  }
  .rail-logo{
    width:40px;height:40px;border-radius:10px;
    background:var(--adim);border:1px solid rgba(245,166,35,.35);
    display:grid;place-items:center;color:var(--accent);margin-bottom:14px;
    box-shadow:0 0 18px rgba(245,166,35,.12);
  }
  .rb{
    width:52px;height:52px;border-radius:10px;background:transparent;border:none;
    color:var(--soft);display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;cursor:pointer;font-size:8px;letter-spacing:.08em;text-transform:uppercase;
    transition:all 130ms;
  }
  .rb:hover{background:rgba(255,255,255,.05);color:var(--copy);}
  .rb.active{background:var(--adim);color:var(--accent);}
  .rb.active svg{filter:drop-shadow(0 0 5px rgba(245,166,35,.5));}
  .rail-sp{flex:1;}
  .rail-pwr{
    width:52px;height:52px;border-radius:10px;
    background:rgba(245,166,35,.08);border:0.5px solid rgba(245,166,35,.32);
    color:var(--accent);display:grid;place-items:center;cursor:pointer;
    transition:all 130ms;
  }
  .rail-pwr:hover{background:rgba(245,166,35,.18);}

  /* ── MAIN ── */
  .main{display:grid;grid-template-rows:60px 1fr 108px;gap:10px;padding:10px;min-width:0;}

  /* STATUS BAR */
  .sbar{
    background:var(--card);border:0.5px solid var(--border);border-radius:var(--rad);
    display:flex;align-items:center;padding:0 20px;gap:14px;
  }
  .room{font-size:20px;font-weight:900;letter-spacing:-.02em;}
  .sep{width:1px;height:20px;background:var(--border);}
  .rtag{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
  .sbar-sp{flex:1;}
  .pill{display:flex;align-items:center;gap:6px;padding:5px 13px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
  .pill-ok{background:rgba(34,197,94,.1);border:0.5px solid rgba(34,197,94,.25);color:#86efac;}
  .pill-occ{background:var(--adim);border:0.5px solid var(--aborder);color:var(--accent);}
  .pdot{width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 6px currentColor;animation:pulse 2.2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
  .occ-timer{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--warn);padding:4px 10px;border-radius:7px;background:rgba(251,146,60,.08);border:0.5px solid rgba(251,146,60,.22);}
  .ot-dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 1.4s ease-in-out infinite;}

  /* TILES */
  .tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .tile{
    background:var(--card);border:0.5px solid var(--border);border-radius:var(--rad);
    display:flex;flex-direction:column;overflow:hidden;
    position:relative;transition:border-color 220ms,box-shadow 220ms;
  }
  .tile::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(245,166,35,.4),transparent);opacity:0;transition:opacity 220ms;}
  .tile.aud{border-color:rgba(34,197,94,.35);box-shadow:0 0 0 1px rgba(34,197,94,.08),0 6px 24px rgba(34,197,94,.05);}
  .tile.aud::before{background:linear-gradient(90deg,transparent,rgba(34,197,94,.4),transparent);opacity:1;}

  .th{padding:14px 16px 11px;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;}
  .tl{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
  .led{width:7px;height:7px;border-radius:50%;}
  .led-on{background:var(--success);box-shadow:0 0 8px rgba(34,197,94,.7);}
  .led-off{background:rgba(100,116,139,.2);}
  .tsrc{font-size:22px;font-weight:900;letter-spacing:-.01em;color:var(--accent);}
  .tsrc.none{color:var(--soft);font-size:17px;font-weight:600;}
  .tacts{display:flex;gap:3px;}
  .ib{width:36px;height:36px;border-radius:8px;background:transparent;border:none;color:var(--soft);display:grid;place-items:center;cursor:pointer;transition:all 100ms;}
  .ib:hover{background:rgba(255,255,255,.07);color:var(--copy);}
  .ib.on{color:var(--success);filter:drop-shadow(0 0 4px rgba(34,197,94,.4));}

  /* SOURCE BUTTONS — icon + label, orange active state */
  .srcs{display:grid;grid-template-columns:1fr 1fr;flex:1;}
  .sb{
    border:none;background:transparent;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:6px;color:var(--soft);font-size:12px;font-weight:700;
    border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border);
    min-height:72px;position:relative;overflow:hidden;
    transition:background 110ms,color 110ms;
  }
  .sb:nth-child(2n){border-right:none;}
  .sb:nth-child(3),.sb:nth-child(4){border-bottom:none;}
  .sb:hover{background:rgba(245,166,35,.04);color:var(--copy);}
  .sb.on{background:radial-gradient(ellipse at 50% 110%,rgba(245,166,35,.14),transparent 60%);color:#fff;}
  .sb.on .sb-ico{color:var(--accent);}
  .sb.on::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);box-shadow:0 0 10px rgba(245,166,35,.55);}
  .sb-ico{color:var(--muted);transition:color 110ms;}

  /* FOOTER — 3 zones */
  footer{
    background:var(--card);border:0.5px solid var(--border);border-radius:var(--rad);
    display:grid;grid-template-columns:auto 0.5px 1fr 0.5px auto;
    overflow:hidden;
  }
  .fvl{background:var(--border);}

  .fz-pwr{
    display:flex;align-items:center;justify-content:center;gap:10px;
    padding:0 28px;cursor:pointer;transition:background 130ms;
    background:rgba(245,166,35,.06);
  }
  .fz-pwr:hover{background:rgba(245,166,35,.12);}
  .fzp-icon{color:var(--accent);filter:drop-shadow(0 0 8px rgba(245,166,35,.35));}
  .fzp-lbl{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
  .fzp-val{font-size:15px;font-weight:900;color:var(--accent);}

  .fz-mics{display:flex;align-items:center;gap:10px;padding:10px 16px;}
  .fz-lbl{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);white-space:nowrap;margin-right:4px;}
  .mbtn{
    display:flex;flex-direction:column;align-items:center;gap:4px;
    padding:8px 16px;border-radius:10px;border:0.5px solid var(--border);
    background:rgba(13,27,46,.8);color:var(--soft);
    font-size:11px;font-weight:700;cursor:pointer;
    min-height:86px;justify-content:center;
    transition:all 110ms;
  }
  .mbtn:hover{background:rgba(30,50,80,.7);color:var(--copy);}
  .mbtn.muted{background:rgba(239,68,68,.1);color:#fca5a5;border-color:rgba(239,68,68,.28);}
  .m-tag{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border-radius:4px;}
  .m-live{background:rgba(34,197,94,.15);color:#86efac;}
  .m-muted{background:rgba(239,68,68,.2);color:#fca5a5;}

  .fz-vol{display:flex;align-items:center;justify-content:center;gap:8px;padding:0 22px;}
  .vbtn{
    width:54px;min-height:86px;border-radius:10px;border:0.5px solid var(--border);
    background:rgba(13,27,46,.8);color:var(--soft);
    display:grid;place-items:center;cursor:pointer;font-size:18px;font-weight:700;
    transition:all 110ms;
  }
  .vbtn:hover{background:rgba(30,50,80,.7);color:var(--copy);}
  .vbtn:active{background:rgba(245,166,35,.15);color:var(--accent);}

  /* ── COLOR COMPARISON STRIP ── */
  .compare-strip{
    position:fixed;bottom:0;left:72px;right:0;
    height:36px;display:flex;align-items:center;
    background:rgba(9,18,32,.95);border-top:0.5px solid var(--border);
    padding:0 16px;gap:20px;z-index:50;
  }
  .cs-lbl{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
  .swatch-row{display:flex;gap:8px;align-items:center;}
  .sw{width:22px;height:22px;border-radius:5px;border:0.5px solid rgba(255,255,255,.12);}
  .sw-lbl{font-size:10px;font-weight:700;color:var(--soft);}
  .cs-sep{width:1px;height:22px;background:var(--border);}

  .mk-badge{position:fixed;top:12px;right:12px;z-index:99;background:rgba(245,166,35,.15);border:1px solid var(--accent);color:var(--accent);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;border-radius:6px;}
</style>
</head>
<body>

<!-- RAIL -->
<nav class="rail">
  <div class="rail-logo">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
  </div>
  <button class="rb active">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
    Home
  </button>
  <button class="rb">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h4l2-2h4l2 2h4v12H4z"/><circle cx="12" cy="13" r="3.6"/></svg>
    Cams
  </button>
  <button class="rb">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="2.5"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3"/></svg>
    Setup
  </button>
  <div class="rail-sp"></div>
  <button class="rail-pwr">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 3v9"/><path d="M6.5 7.5a8 8 0 1 0 11 0"/></svg>
  </button>
</nav>

<!-- MAIN -->
<div class="main">

  <div class="sbar">
    <span class="room">AA140</span>
    <div class="sep"></div>
    <span class="rtag">MCCCD · AV Control</span>
    <div class="sbar-sp"></div>
    <div class="occ-timer"><span class="ot-dot"></span>42:18</div>
    <div class="pill pill-ok"><span class="pdot"></span>Online</div>
    <div class="pill pill-occ"><span class="pdot" style="animation-delay:.5s"></span>Occupied</div>
  </div>

  <div class="tiles">
    <!-- D1 — active + audio -->
    <div class="tile aud">
      <div class="th">
        <div>
          <div class="tl"><span class="led led-on"></span>Display 1</div>
          <div class="tsrc">Room PC</div>
        </div>
        <div class="tacts">
          <button class="ib on"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 10v4h4l5 4V6L7 10H3z"/><path d="M16 8c1.5 1 2.5 2.5 2.5 4S17.5 15 16 16" stroke="currentColor" stroke-width="1.6" fill="none"/></svg></button>
          <button class="ib"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H10M17 7V14"/></svg></button>
        </div>
      </div>
      <div class="srcs">
        <button class="sb on">
          <svg class="sb-ico" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Room PC
        </button>
        <button class="sb">
          <svg class="sb-ico" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Ext PC
        </button>
        <button class="sb">
          <svg class="sb-ico" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 12.55a11 11 0 0114.08 0M1.42 9a16 16 0 0121.16 0M8.53 16.11a6 6 0 016.95 0M12 20h.01"/></svg>AirMedia
        </button>
        <button class="sb">
          <svg class="sb-ico" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 20h20M4 4h16v12H4z"/></svg>Laptop
        </button>
      </div>
    </div>

    <!-- D2 -->
    <div class="tile">
      <div class="th">
        <div>
          <div class="tl"><span class="led led-on"></span>Display 2</div>
          <div class="tsrc none">No Source</div>
        </div>
        <div class="tacts">
          <button class="ib"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 10v4h4l5 4V6L7 10H3z"/></svg></button>
          <button class="ib"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H10M17 7V14"/></svg></button>
        </div>
      </div>
      <div class="srcs">
        <button class="sb"><svg class="sb-ico" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Room PC</button>
        <button class="sb"><svg class="sb-ico" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Ext PC</button>
        <button class="sb"><svg class="sb-ico" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 12.55a11 11 0 0114.08 0M1.42 9a16 16 0 0121.16 0M8.53 16.11a6 6 0 016.95 0M12 20h.01"/></svg>AirMedia</button>
        <button class="sb"><svg class="sb-ico" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 20h20M4 4h16v12H4z"/></svg>Laptop</button>
      </div>
    </div>

    <!-- D3 -->
    <div class="tile">
      <div class="th">
        <div>
          <div class="tl" style="color:var(--muted)"><span class="led led-off"></span>Display 3</div>
          <div class="tsrc none">No Source</div>
        </div>
      </div>
      <div class="srcs">
        <button class="sb"><svg class="sb-ico" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Room PC</button>
        <button class="sb"><svg class="sb-ico" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Ext PC</button>
        <button class="sb"><svg class="sb-ico" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 12.55a11 11 0 0114.08 0M1.42 9a16 16 0 0121.16 0M8.53 16.11a6 6 0 016.95 0M12 20h.01"/></svg>AirMedia</button>
        <button class="sb"><svg class="sb-ico" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 20h20M4 4h16v12H4z"/></svg>Laptop</button>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="fz-pwr">
      <svg class="fzp-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 3v9"/><path d="M6.5 7.5a8 8 0 1 0 11 0"/></svg>
      <div>
        <div class="fzp-lbl">System</div>
        <div class="fzp-val">ON</div>
      </div>
    </div>
    <div class="fvl"></div>
    <div class="fz-mics">
      <span class="fz-lbl">Mics</span>
      <button class="mbtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0014 0M12 19v3"/></svg>
        Lavalier
        <span class="m-tag m-live">Live</span>
      </button>
      <button class="mbtn muted">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0014 0M12 19v3"/></svg>
        Handheld
        <span class="m-tag m-muted">Muted</span>
      </button>
    </div>
    <div class="fvl"></div>
    <div class="fz-vol">
      <span class="fz-lbl" style="writing-mode:vertical-lr;transform:rotate(180deg);margin:0">Vol</span>
      <button class="vbtn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4z" fill="currentColor"/><path d="M16 12h6"/></svg></button>
      <button class="vbtn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4z" fill="currentColor"/><path d="M16 9l6 6M22 9l-6 6"/></svg></button>
      <button class="vbtn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4z" fill="currentColor"/><path d="M16 12h6M19 9v6"/></svg></button>
    </div>
  </footer>

</div>

<!-- COLOR COMPARISON STRIP -->
<div class="compare-strip">
  <span class="cs-lbl">Palette Comparison</span>
  <div class="swatch-row">
    <div class="sw" style="background:#0d1b2e"></div><span class="sw-lbl">#0d1b2e bg</span>
    <div class="sw" style="background:#f5a623"></div><span class="sw-lbl">#f5a623 amber</span>
    <div class="sw" style="background:rgba(196,122,30,.4);border-color:rgba(196,122,30,.6)"></div><span class="sw-lbl">border</span>
  </div>
  <div class="cs-sep"></div>
  <span class="cs-lbl">AA140 Cyan →</span>
  <div class="swatch-row">
    <div class="sw" style="background:#0b1220"></div><span class="sw-lbl">#0b1220 bg</span>
    <div class="sw" style="background:#38bdf8"></div><span class="sw-lbl">#38bdf8 cyan</span>
    <div class="sw" style="background:rgba(148,163,184,.22);border-color:rgba(148,163,184,.4)"></div><span class="sw-lbl">border</span>
  </div>
</div>

<div class="mk-badge">11 — MCCCD Orange Theme</div>
</body>
</html>
