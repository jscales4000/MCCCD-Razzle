<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mockup 12 — Splash / System Off</title>
<style>
  :root{
    --bg:#0d1b2e;--accent:#f5a623;--adim:rgba(245,166,35,.14);
    --success:#22c55e;--danger:#ef4444;
    --copy:#e2e8f0;--muted:#4d6070;--soft:#7c93a8;
    --border:rgba(148,163,184,.14);--rad:16px;
    --panel:rgba(12,20,36,.97);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    width:1280px;height:800px;overflow:hidden;
    background:var(--bg);color:var(--copy);
    font-family:"Segoe UI",system-ui,sans-serif;
    display:flex;flex-direction:column;
    position:relative;
  }

  /* Layered ambient radial glows */
  body::before{
    content:'';position:absolute;inset:0;
    background:
      radial-gradient(ellipse 900px 500px at 50% -80px, rgba(245,166,35,.07), transparent),
      radial-gradient(ellipse 600px 600px at 10% 110%, rgba(245,166,35,.04), transparent);
    pointer-events:none;z-index:0;
  }

  /* Subtle grid texture */
  body::after{
    content:'';position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(148,163,184,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(148,163,184,.04) 1px, transparent 1px);
    background-size:48px 48px;
    pointer-events:none;z-index:0;
  }

  /* ── TOP BAR ── */
  .topbar{
    position:relative;z-index:2;
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 32px;
  }
  .mcccd-logo{
    display:flex;align-items:center;gap:12px;
    font-size:13px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);
  }
  .logo-mark{
    width:36px;height:36px;border-radius:8px;
    background:var(--adim);border:1px solid rgba(245,166,35,.3);
    display:grid;place-items:center;color:var(--accent);
  }
  .topbar-right{
    display:flex;align-items:center;gap:14px;
    font-size:12px;color:var(--muted);font-weight:600;
  }
  .time{font-size:22px;font-weight:800;color:var(--soft);letter-spacing:-.01em;font-variant-numeric:tabular-nums;}
  .date{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.06em;}

  /* ── CENTER HERO ── */
  .hero{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    position:relative;z-index:2;gap:0;
    padding-bottom:60px;
  }

  .room-eyebrow{
    font-size:11px;font-weight:700;letter-spacing:.28em;text-transform:uppercase;
    color:var(--muted);margin-bottom:16px;
  }
  .room-name{
    font-size:88px;font-weight:900;letter-spacing:-.04em;line-height:1;
    color:var(--copy);
    text-shadow:0 0 80px rgba(245,166,35,.15);
    margin-bottom:6px;
  }
  .room-name span{color:var(--accent);}
  .room-sub{
    font-size:16px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
    color:var(--muted);margin-bottom:56px;
  }

  /* Power-on CTA */
  .power-cta{
    display:flex;flex-direction:column;align-items:center;gap:16px;
  }
  .power-btn-big{
    width:96px;height:96px;border-radius:50%;
    background:rgba(245,166,35,.1);
    border:2px solid rgba(245,166,35,.4);
    color:var(--accent);
    display:grid;place-items:center;cursor:pointer;
    box-shadow:0 0 0 0 rgba(245,166,35,.3),0 0 40px rgba(245,166,35,.08);
    animation:ring-pulse 2.8s ease-in-out infinite;
    transition:all 160ms;
    position:relative;
  }
  .power-btn-big::before{
    content:'';position:absolute;inset:-10px;border-radius:50%;
    border:1px solid rgba(245,166,35,.15);
    animation:ring-expand 2.8s ease-in-out infinite;
  }
  .power-btn-big::after{
    content:'';position:absolute;inset:-22px;border-radius:50%;
    border:1px solid rgba(245,166,35,.07);
    animation:ring-expand 2.8s ease-in-out infinite .4s;
  }
  @keyframes ring-pulse{
    0%,100%{box-shadow:0 0 0 0 rgba(245,166,35,.25),0 0 40px rgba(245,166,35,.08);}
    50%{box-shadow:0 0 0 12px rgba(245,166,35,.04),0 0 60px rgba(245,166,35,.14);}
  }
  @keyframes ring-expand{
    0%{transform:scale(1);opacity:.6;}
    100%{transform:scale(1.4);opacity:0;}
  }
  .power-hint{
    font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);animation:fade-cycle 2.8s ease-in-out infinite;
  }
  @keyframes fade-cycle{0%,100%{opacity:.5;}50%{opacity:1;}}

  /* ── STATUS STRIP ── */
  .status-strip{
    position:relative;z-index:2;
    display:flex;align-items:center;justify-content:center;gap:24px;
    padding:20px 32px 28px;
  }
  .ss-item{
    display:flex;align-items:center;gap:8px;
    font-size:12px;font-weight:600;color:var(--muted);
    padding:7px 14px;border-radius:8px;
    background:rgba(15,23,42,.6);border:0.5px solid var(--border);
  }
  .ss-dot{width:7px;height:7px;border-radius:50%;background:currentColor;}
  .ss-ok{color:#86efac;}
  .ss-warn{color:var(--accent);}
  .ss-off{color:rgba(100,116,139,.5);}

  /* Network wave icon (simple) */
  .ss-icon{opacity:.7;}

  /* ── BADGE ── */
  .badge{position:fixed;top:12px;right:12px;z-index:99;background:rgba(245,166,35,.15);border:1px solid var(--accent);color:var(--accent);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;border-radius:6px;}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="mcccd-logo">
    <div class="logo-mark">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </div>
    MCCCD · Maricopa
  </div>
  <div class="topbar-right">
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;">
      <span class="time">7:42 PM</span>
      <span class="date">Thursday, May 1</span>
    </div>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <p class="room-eyebrow">Classroom AV Control · TSW-770</p>
  <h1 class="room-name">AA<span>140</span></h1>
  <p class="room-sub">Maricopa Community College · Building A</p>

  <div class="power-cta">
    <button class="power-btn-big" aria-label="Power on room AV system">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M12 3v9"/>
        <path d="M6.5 7.5a8 8 0 1 0 11 0"/>
      </svg>
    </button>
    <span class="power-hint">Touch to Start</span>
  </div>
</div>

<!-- STATUS STRIP -->
<div class="status-strip">
  <div class="ss-item">
    <svg class="ss-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
    <span class="ss-dot ss-ok"></span>
    <span style="color:var(--copy)">Network Online</span>
  </div>
  <div class="ss-item">
    <svg class="ss-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
    <span class="ss-dot ss-off"></span>
    <span>Displays Off</span>
  </div>
  <div class="ss-item">
    <svg class="ss-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    <span class="ss-dot ss-off"></span>
    <span>Audio Idle</span>
  </div>
  <div class="ss-item">
    <svg class="ss-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    <span class="ss-dot ss-warn"></span>
    <span style="color:var(--accent)">Room Vacant · 12 min</span>
  </div>
</div>

<div class="badge">Mockup 12</div>
</body>
</html>
