<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mockup 22 — Home: Centered Hero</title>
<style>
  :root{
    --bg:#0d1b2e;--accent:#f5a623;--adim:rgba(245,166,35,.14);
    --success:#22c55e;--danger:#ef4444;
    --copy:#e2e8f0;--soft:#94a3b8;--muted:#64748b;
    --border:rgba(148,163,184,.15);--rad:14px;
    --panel:rgba(12,20,36,.97);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    width:1280px;height:800px;overflow:hidden;
    background:var(--bg);color:var(--copy);
    font-family:"Segoe UI",system-ui,sans-serif;
    display:grid;grid-template-rows:70px 1fr 80px;gap:14px;padding:14px;
    position:relative;
  }
  body::before{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:1300px;height:700px;background:radial-gradient(ellipse,rgba(245,166,35,.07),transparent 65%);pointer-events:none;}

  /* HEADER — minimal */
  header{
    display:flex;align-items:center;padding:0 18px;gap:16px;
  }
  .room{font-size:40px;font-weight:900;letter-spacing:-.025em;}
  .small-pill{
    display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:12px;
    font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  }
  .small-pill.ok{background:rgba(34,197,94,.08);border:0.5px solid rgba(34,197,94,.25);color:#86efac;}
  .small-pill.occ{background:var(--adim);border:0.5px solid rgba(245,166,35,.3);color:var(--accent);}
  .pdot{width:5px;height:5px;border-radius:50%;background:currentColor;box-shadow:0 0 5px currentColor;animation:pulse 2.2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  .hsp{flex:1;}
  .nav-btn{
    display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:8px;
    background:transparent;border:none;color:var(--soft);
    font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;
    transition:color 110ms;
  }
  .nav-btn:hover{color:var(--copy);}

  /* BODY — centered hero */
  .body-wrap{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    position:relative;min-height:0;gap:24px;
  }
  .eyebrow{
    font-size:11px;font-weight:700;letter-spacing:.34em;text-transform:uppercase;
    color:var(--soft);
    background:linear-gradient(90deg,transparent,rgba(245,166,35,.4),transparent);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-align:center;
  }
  .src-row{
    display:grid;grid-template-columns:repeat(4,1fr);gap:18px;
    width:80%;max-height:440px;
  }
  .hero-card{
    background:var(--panel);border:0.5px solid var(--border);border-radius:18px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:18px;padding:36px 18px;cursor:pointer;
    transition:all 220ms;position:relative;
  }
  .hero-card:hover{border-color:rgba(245,166,35,.3);transform:translateY(-2px);}
  .hc-ico{color:var(--soft);transition:color 220ms;}
  .hc-name{font-size:22px;font-weight:800;letter-spacing:-.01em;color:var(--copy);}
  .hc-sub{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
  .hero-card.active{
    border:1px solid var(--accent);
    box-shadow:0 0 32px rgba(245,166,35,.28),0 0 0 1px rgba(245,166,35,.2),0 14px 40px rgba(245,166,35,.18);
  }
  .hero-card.active .hc-ico,.hero-card.active .hc-name{color:var(--accent);}

  .adv-float{
    position:absolute;top:-2px;right:0;
    display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:7px;
    background:rgba(30,41,59,.55);border:0.5px solid var(--border);color:var(--soft);
    font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;
  }
  .adv-float:hover{background:rgba(245,166,35,.08);color:var(--accent);border-color:rgba(245,166,35,.25);}

  /* FOOTER — minimal */
  footer{
    background:var(--panel);border:0.5px solid var(--border);border-radius:var(--rad);
    display:grid;grid-template-columns:auto 1fr auto;align-items:center;padding:0 22px;gap:18px;
  }
  .pwr-btn{
    display:flex;align-items:center;gap:9px;padding:10px 18px;border-radius:9px;
    background:rgba(245,166,35,.08);border:0.5px solid rgba(245,166,35,.32);color:var(--accent);
    font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;
  }
  .mics{display:flex;align-items:center;gap:8px;justify-content:center;}
  .mic-lbl{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
  .mbtn{
    display:flex;align-items:center;gap:7px;padding:8px 13px;border-radius:8px;
    border:0.5px solid var(--border);background:transparent;color:var(--soft);
    font-size:11px;font-weight:700;cursor:pointer;
  }
  .mbtn.live{color:#86efac;border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.07);}
  .vol-grp{display:flex;align-items:center;gap:10px;justify-self:end;}
  .vol-lbl{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
  .vbtn{
    display:flex;align-items:center;gap:7px;padding:8px 12px;
    background:transparent;border:none;color:var(--soft);
    font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;
  }
  .vbtn:hover{color:var(--accent);}

  .badge{position:fixed;top:14px;right:14px;z-index:99;background:rgba(245,166,35,.15);border:1px solid var(--accent);color:var(--accent);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;border-radius:6px;}
</style>
</head>
<body>

<header>
  <span class="room">AA140</span>
  <span class="small-pill ok"><span class="pdot"></span>Online</span>
  <span class="small-pill occ"><span class="pdot"></span>Occupied</span>
  <div class="hsp"></div>
  <button class="nav-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h4l2-2h4l2 2h4v12H4z"/><circle cx="12" cy="13" r="3.6"/></svg>
    Cameras
  </button>
  <button class="nav-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 1v3M12 20v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1 12h3M20 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>
    Settings
  </button>
</header>

<div class="body-wrap">
  <button class="adv-float">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Advanced Routing →
  </button>
  <div class="eyebrow">— Choose your source —</div>
  <div class="src-row">
    <button class="hero-card">
      <svg class="hc-ico" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      <div class="hc-name">Room PC</div>
      <div class="hc-sub">HDMI 1</div>
    </button>
    <button class="hero-card">
      <svg class="hc-ico" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="12" rx="2"/><path d="M3 10h18M8 20h8M12 16v4"/></svg>
      <div class="hc-name">Ext PC</div>
      <div class="hc-sub">HDMI 2</div>
    </button>
    <button class="hero-card active">
      <svg class="hc-ico" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
      <div class="hc-name">AirMedia</div>
      <div class="hc-sub">Wireless</div>
    </button>
    <button class="hero-card">
      <svg class="hc-ico" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="13" rx="2"/><path d="M2 20h20"/></svg>
      <div class="hc-name">Laptop</div>
      <div class="hc-sub">HDMI 3</div>
    </button>
  </div>
</div>

<footer>
  <button class="pwr-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 3v9"/><path d="M6.5 7.5a8 8 0 1 0 11 0"/></svg>
    Power
  </button>
  <div class="mics">
    <span class="mic-lbl">Mics</span>
    <button class="mbtn live">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0014 0M12 19v3"/></svg>
      Lav
    </button>
    <button class="mbtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0014 0M12 19v3"/></svg>
      Handheld
    </button>
  </div>
  <div class="vol-grp">
    <span class="vol-lbl">Vol</span>
    <button class="vbtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4z" fill="currentColor"/><path d="M16 12h6"/></svg>
      −
    </button>
    <button class="vbtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4z" fill="currentColor"/><path d="M16 9l6 6M22 9l-6 6"/></svg>
      Mute
    </button>
    <button class="vbtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4z" fill="currentColor"/><path d="M16 12h6M19 9v6"/></svg>
      +
    </button>
  </div>
</footer>

<div class="badge">Mockup 22 — Centered Hero</div>
</body>
</html>
