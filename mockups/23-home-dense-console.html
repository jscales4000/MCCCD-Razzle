<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mockup 23 — Home: Dense Console</title>
<style>
  :root{
    --bg:#0d1b2e;--accent:#f5a623;--adim:rgba(245,166,35,.14);
    --success:#22c55e;--danger:#ef4444;
    --copy:#e2e8f0;--soft:#94a3b8;--muted:#64748b;
    --border:rgba(148,163,184,.15);--rad:10px;
    --panel:rgba(12,20,36,.97);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    width:1280px;height:800px;overflow:hidden;
    background:var(--bg);color:var(--copy);
    font-family:"Segoe UI",system-ui,sans-serif;
    display:grid;grid-template-rows:62px 1fr 92px;gap:8px;padding:8px;
    position:relative;
  }
  body::before{content:'';position:fixed;top:-80px;left:50%;transform:translateX(-50%);width:900px;height:420px;background:radial-gradient(ellipse,rgba(245,166,35,.04),transparent 70%);pointer-events:none;}

  /* HEADER — denser */
  header{
    background:var(--panel);border:0.5px solid var(--border);border-radius:var(--rad);
    display:flex;align-items:center;padding:0 16px;gap:12px;
  }
  .room{font-size:24px;font-weight:900;letter-spacing:-.02em;}
  .stat-block{
    display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:7px;
    background:rgba(13,27,46,.55);border:0.5px solid var(--border);
  }
  .sb-item{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);}
  .sb-item.ok{color:#86efac;}
  .sb-item.occ{color:var(--accent);}
  .sb-item.clk{color:var(--copy);font-variant-numeric:tabular-nums;}
  .sb-sep{width:1px;height:14px;background:var(--border);}
  .pdot{width:5px;height:5px;border-radius:50%;background:currentColor;box-shadow:0 0 5px currentColor;animation:pulse 2.2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  .hsp{flex:1;}
  .nav-btn{
    display:flex;align-items:center;gap:7px;padding:8px 13px;border-radius:7px;
    background:rgba(13,27,46,.5);border:0.5px solid var(--border);color:var(--soft);
    font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;
    transition:all 110ms;
  }
  .nav-btn:hover{background:rgba(30,41,59,.6);color:var(--copy);}

  /* BODY */
  .body-grid{display:flex;flex-direction:column;gap:8px;min-height:0;}
  .src-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;flex:1;}
  .console-card{
    background:var(--panel);border:0.5px solid var(--border);border-radius:var(--rad);
    display:flex;flex-direction:column;justify-content:space-between;
    padding:18px 18px 16px;cursor:pointer;position:relative;overflow:hidden;
    transition:all 200ms;
  }
  .console-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:2px;
    background:transparent;transition:all 200ms;
  }
  .console-card:hover{border-color:rgba(148,163,184,.3);}
  .cc-top{display:flex;justify-content:space-between;align-items:flex-start;}
  .cc-ico{color:var(--soft);transition:color 200ms;}
  .cc-led{width:9px;height:9px;border-radius:50%;background:rgba(34,197,94,.85);box-shadow:0 0 8px rgba(34,197,94,.65);}
  .cc-led.dim{background:rgba(100,116,139,.4);box-shadow:none;}
  .cc-bottom{display:flex;flex-direction:column;gap:6px;margin-top:14px;}
  .cc-name{font-size:24px;font-weight:900;letter-spacing:-.02em;color:var(--copy);transition:color 200ms;}
  .cc-meta{display:flex;align-items:center;gap:8px;}
  .cc-input{font-size:9px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);padding:3px 7px;border-radius:4px;background:rgba(148,163,184,.08);border:0.5px solid var(--border);}
  .cc-conn{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#86efac;}
  .cc-conn.dim{color:var(--muted);}
  .console-card.active{
    background:linear-gradient(180deg,rgba(245,166,35,.10),rgba(8,14,26,.7));
    border-color:rgba(245,166,35,.4);
  }
  .console-card.active::before{
    background:var(--accent);
    box-shadow:0 0 12px rgba(245,166,35,.7);
    animation:pulse 1.8s ease-in-out infinite;
  }
  .console-card.active .cc-name,.console-card.active .cc-ico{color:var(--accent);}

  .adv-row{display:flex;justify-content:flex-end;}
  .adv-btn{
    display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:6px;
    background:rgba(30,41,59,.55);border:0.5px solid var(--border);color:var(--soft);
    font-size:10px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;
    transition:all 110ms;
  }
  .adv-btn:hover{background:rgba(245,166,35,.08);color:var(--accent);border-color:rgba(245,166,35,.25);}

  /* FOOTER — denser */
  footer{
    background:var(--panel);border:0.5px solid var(--border);border-radius:var(--rad);
    display:grid;grid-template-columns:auto 1fr auto;align-items:center;padding:0 14px;gap:14px;
    position:relative;
  }
  .pwr-btn{
    display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:8px;
    background:rgba(245,166,35,.08);border:0.5px solid rgba(245,166,35,.35);color:var(--accent);
    font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;
  }
  .mics{display:flex;align-items:center;gap:8px;justify-content:center;}
  .mic-lbl{font-size:9px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}
  .mbtn{
    display:flex;align-items:center;gap:7px;padding:9px 14px;border-radius:8px;
    border:0.5px solid var(--border);background:rgba(13,27,46,.55);color:var(--soft);
    font-size:11px;font-weight:800;cursor:pointer;
  }
  .mbtn.live{color:#86efac;border-color:rgba(34,197,94,.32);background:rgba(34,197,94,.08);}
  .vol-grp{display:flex;align-items:center;gap:10px;justify-self:end;}
  .vol-lbl{font-size:9px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}
  .vbtn{
    display:flex;align-items:center;gap:7px;padding:9px 12px;
    background:transparent;border:none;color:var(--soft);
    font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;
  }
  .vbtn:hover{color:var(--accent);}

  /* VOLUME POPUP — visible, larger */
  .vol-popup{
    position:absolute;bottom:calc(100% + 8px);right:14px;
    background:rgba(8,14,26,.99);border:1px solid rgba(245,166,35,.45);border-radius:10px;
    padding:14px 16px;display:flex;flex-direction:column;gap:8px;
    box-shadow:0 14px 32px rgba(0,0,0,.55),0 0 0 1px rgba(245,166,35,.12);
    min-width:280px;
  }
  .vp-row{display:flex;align-items:center;gap:12px;}
  .vp-ico{color:var(--accent);}
  .vp-master{font-size:9px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);}
  .vp-val{font-size:22px;font-weight:900;color:var(--accent);font-variant-numeric:tabular-nums;margin-left:auto;}
  .vp-bar{
    height:8px;border-radius:4px;background:rgba(148,163,184,.12);position:relative;overflow:hidden;
  }
  .vp-bar::before{
    content:'';position:absolute;top:0;left:0;bottom:0;width:65%;
    background:linear-gradient(90deg,rgba(245,166,35,.85),var(--accent));
    box-shadow:0 0 10px rgba(245,166,35,.4);
  }
  .vp-link{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--soft);display:flex;align-items:center;gap:5px;}
  .vp-link b{color:var(--accent);font-weight:800;}

  .badge{position:fixed;top:12px;right:12px;z-index:99;background:rgba(245,166,35,.15);border:1px solid var(--accent);color:var(--accent);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;border-radius:6px;}
</style>
</head>
<body>

<header>
  <span class="room">AA140</span>
  <div class="stat-block">
    <span class="sb-item ok"><span class="pdot"></span>Net Online</span>
    <span class="sb-sep"></span>
    <span class="sb-item occ"><span class="pdot"></span>Occupied</span>
    <span class="sb-sep"></span>
    <span class="sb-item clk">14:32</span>
  </div>
  <div class="hsp"></div>
  <button class="nav-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h4l2-2h4l2 2h4v12H4z"/><circle cx="12" cy="13" r="3.6"/></svg>
    Cameras
  </button>
  <button class="nav-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 1v3M12 20v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1 12h3M20 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>
    Settings
  </button>
</header>

<div class="body-grid">
  <div class="src-row">
    <button class="console-card">
      <div class="cc-top">
        <svg class="cc-ico" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        <div class="cc-led"></div>
      </div>
      <div class="cc-bottom">
        <div class="cc-name">Room PC</div>
        <div class="cc-meta">
          <span class="cc-input">HDMI</span>
          <span class="cc-conn">Connected</span>
        </div>
      </div>
    </button>
    <button class="console-card">
      <div class="cc-top">
        <svg class="cc-ico" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="4" width="18" height="12" rx="2"/><path d="M3 10h18M8 20h8M12 16v4"/></svg>
        <div class="cc-led dim"></div>
      </div>
      <div class="cc-bottom">
        <div class="cc-name">Ext PC</div>
        <div class="cc-meta">
          <span class="cc-input">HDMI</span>
          <span class="cc-conn dim">No Signal</span>
        </div>
      </div>
    </button>
    <button class="console-card active">
      <div class="cc-top">
        <svg class="cc-ico" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
        <div class="cc-led"></div>
      </div>
      <div class="cc-bottom">
        <div class="cc-name">AirMedia</div>
        <div class="cc-meta">
          <span class="cc-input">Wireless</span>
          <span class="cc-conn">Streaming · 3 users</span>
        </div>
      </div>
    </button>
    <button class="console-card">
      <div class="cc-top">
        <svg class="cc-ico" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="4" width="20" height="13" rx="2"/><path d="M2 20h20"/></svg>
        <div class="cc-led"></div>
      </div>
      <div class="cc-bottom">
        <div class="cc-name">Laptop</div>
        <div class="cc-meta">
          <span class="cc-input">HDMI</span>
          <span class="cc-conn">Connected</span>
        </div>
      </div>
    </button>
  </div>
  <div class="adv-row">
    <button class="adv-btn">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Advanced
    </button>
  </div>
</div>

<footer>
  <button class="pwr-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 3v9"/><path d="M6.5 7.5a8 8 0 1 0 11 0"/></svg>
    Power
  </button>
  <div class="mics">
    <span class="mic-lbl">Mics</span>
    <button class="mbtn live">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0014 0M12 19v3"/></svg>
      Lav
    </button>
    <button class="mbtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0014 0M12 19v3"/></svg>
      Handheld
    </button>
  </div>
  <div class="vol-grp">
    <span class="vol-lbl">Vol</span>
    <button class="vbtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4z" fill="currentColor"/><path d="M16 12h6"/></svg>
      Vol−
    </button>
    <button class="vbtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4z" fill="currentColor"/><path d="M16 9l6 6M22 9l-6 6"/></svg>
      Mute
    </button>
    <button class="vbtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4z" fill="currentColor"/><path d="M16 12h6M19 9v6"/></svg>
      Vol+
    </button>
  </div>

  <!-- VOLUME POPUP -->
  <div class="vol-popup">
    <div class="vp-row">
      <svg class="vp-ico" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4z" fill="currentColor"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
      <span class="vp-master">Master</span>
      <span class="vp-val">65%</span>
    </div>
    <div class="vp-bar"></div>
    <div class="vp-link">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      Linked: <b>Program</b>
    </div>
  </div>
</footer>

<div class="badge">Mockup 23 — Dense Console</div>
</body>
</html>
