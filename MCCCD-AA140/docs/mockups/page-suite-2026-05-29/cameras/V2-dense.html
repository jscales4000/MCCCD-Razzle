<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MCCCD AA140 — Cameras · V2 Dense</title>
<style>
  :root {
    --bg-page: #050a14;
    --bg-panel: #0d1b2e;
    --bg-panel-soft: rgba(15, 23, 42, 0.55);
    --border: rgba(148, 163, 184, 0.18);
    --border-strong: rgba(148, 163, 184, 0.32);
    --accent: #f5a623;
    --accent-soft: rgba(245, 166, 35, 0.28);
    --accent-glow: rgba(245, 166, 35, 0.45);
    --active: #fde047;
    --copy: #e2e8f0;
    --copy-soft: #cbd5e1;
    --copy-muted: #94a3b8;
    --success: #22c55e;
    --warn: #fb923c;
    --danger: #ef4444;
    --radius-card: 14px;
    --radius-button: 10px;
    --radius-pill: 999px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #02060d;
    color: var(--copy);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .frame {
    width: 1280px;
    height: 800px;
    background: var(--bg-page);
    border-radius: 18px;
    border: 1px solid rgba(148,163,184,0.08);
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    overflow: hidden;
    display: grid;
    grid-template-rows: 72px 1fr 112px;
    gap: 10px;
    padding: 12px;
  }

  .gc {
    background: linear-gradient(180deg, rgba(13,27,46,0.85), rgba(8,14,26,0.85));
    border: 0.5px solid var(--border);
    border-radius: var(--radius-card);
  }

  /* HEADER (dense — adds inline cam picker + telemetry chips) */
  .hdr {
    display: flex; align-items: center; gap: 12px;
    padding: 0 16px;
  }
  .hbtn {
    height: 56px; padding: 0 18px; min-width: 64px;
    border-radius: var(--radius-button);
    background: rgba(30,41,59,0.55);
    border: 0.5px solid var(--border);
    color: var(--copy-soft);
    font-weight: 700; font-size: 12px;
    letter-spacing: 0.08em; text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 8px;
    cursor: pointer; font-family: inherit;
  }
  .hsep { width: 1px; height: 28px; background: var(--border); }
  .room { font-size: 16px; font-weight: 800; line-height: 1; }
  .eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--copy-muted); margin-bottom: 3px; }
  .spacer { flex: 1; }

  .cam-seg {
    display: inline-flex; height: 56px;
    border-radius: 10px; overflow: hidden;
    border: 0.5px solid var(--border);
  }
  .cam-seg-btn {
    height: 56px; min-width: 168px; padding: 0 18px;
    background: rgba(30,41,59,0.55);
    border: none; border-right: 0.5px solid var(--border);
    color: var(--copy-soft);
    font-family: inherit;
    font-weight: 700; font-size: 12px;
    letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer;
    display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
    gap: 2px;
  }
  .cam-seg-btn:last-child { border-right: none; }
  .cam-seg-btn em { font-style: normal; font-size: 10px; color: var(--copy-muted); letter-spacing: 0.10em; }
  .cam-seg-btn.active {
    background: linear-gradient(180deg, rgba(253,224,71,0.10), rgba(8,14,26,0.85));
    color: var(--active);
  }
  .cam-seg-btn.active em { color: var(--active); opacity: 0.85; }

  .pill {
    height: 44px; padding: 0 14px;
    border-radius: var(--radius-pill);
    background: rgba(34,197,94,0.10);
    border: 0.5px solid rgba(34,197,94,0.30);
    color: #86efac;
    font-weight: 700; font-size: 11px;
    display: inline-flex; align-items: center; gap: 8px;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; box-shadow: 0 0 8px currentColor; }

  /* MAIN — dense grid: preview + tight sidebars */
  .main {
    display: grid;
    grid-template-columns: 1fr 264px;
    gap: 10px;
    min-height: 0;
  }

  /* Preview */
  .preview {
    padding: 10px 12px 12px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 8px;
    min-height: 0;
  }
  .preview-head {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .panel-label {
    margin: 0; color: var(--copy-muted);
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.20em; text-transform: uppercase;
  }
  .telemetry { display: flex; gap: 6px; }
  .tchip {
    height: 26px; padding: 0 10px;
    border-radius: var(--radius-pill);
    background: rgba(30,41,59,0.65);
    border: 0.5px solid var(--border);
    color: var(--copy-soft);
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.10em; text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .tchip b { color: var(--copy); font-weight: 800; }

  .video-window {
    position: relative;
    aspect-ratio: 16 / 9;
    height: 100%;
    width: auto;
    max-width: 100%;
    place-self: center;
    background: #000;
    border-radius: var(--radius-button);
    border: 0.5px solid var(--border-strong);
    overflow: hidden;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 3px),
      radial-gradient(circle at 50% 45%, rgba(40,60,90,0.35) 0%, rgba(0,0,0,0.95) 70%);
  }
  .live-cap {
    position: absolute; top: 10px; left: 10px;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 5px 10px; border-radius: var(--radius-pill);
    background: rgba(0,0,0,0.55); border: 0.5px solid rgba(255,255,255,0.10);
    font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
    color: #f1f5f9;
  }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--danger); box-shadow: 0 0 8px var(--danger); }
  .stamp {
    position: absolute; bottom: 10px; right: 10px;
    padding: 4px 9px; border-radius: 6px;
    background: rgba(0,0,0,0.55); border: 0.5px solid rgba(255,255,255,0.08);
    font-size: 10px; font-weight: 600; color: #cbd5e1;
    font-variant-numeric: tabular-nums; letter-spacing: 0.06em;
  }

  /* PTZ V2 dense: 64px floor, dark discs */
  .ptz-overlay { position: absolute; inset: 0; pointer-events: none; }
  .ptz-btn {
    pointer-events: auto;
    position: absolute;
    width: 64px; height: 64px;
    color: #fff;
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(255,255,255,0.20);
    border-radius: 50%;
    backdrop-filter: blur(4px);
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .ptz-up    { top: 10px;    left: 50%; transform: translateX(-50%); }
  .ptz-down  { bottom: 10px; left: 50%; transform: translateX(-50%); }
  .ptz-left  { left: 10px;   top: 50%;  transform: translateY(-50%); }
  .ptz-right { right: 10px;  top: 50%;  transform: translateY(-50%); }
  .ptz-btn svg { width: 26px; height: 26px; }

  /* Below preview — speed strip (dense) */
  .speed-strip {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .speed-card {
    padding: 8px 12px;
    border-radius: 10px;
    background: rgba(15,23,42,0.55);
    border: 0.5px solid var(--border);
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 10px;
    min-height: 48px;
  }
  .speed-card .lab {
    font-size: 10px; font-weight: 700; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--copy-muted);
  }
  .slider-track {
    position: relative; height: 12px;
    border-radius: var(--radius-pill);
    background: rgba(30,41,59,0.7);
    border: 0.5px solid var(--border);
  }
  .slider-fill {
    position: absolute; inset: 0 auto 0 0;
    border-radius: var(--radius-pill);
    background: linear-gradient(90deg, rgba(245,166,35,0.55), rgba(245,166,35,0.85));
  }
  .slider-thumb {
    position: absolute; top: 50%;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid var(--accent);
    box-shadow: 0 2px 6px rgba(0,0,0,0.6);
    transform: translate(-50%, -50%);
  }
  .speed-card .read {
    font-weight: 800; font-size: 16px; color: var(--copy);
    font-variant-numeric: tabular-nums; min-width: 28px; text-align: right;
  }

  /* RAIL: zoom + VTC + tracking — dense */
  .rail {
    padding: 12px;
    display: grid;
    grid-template-rows: auto auto auto auto;
    gap: 10px;
    min-height: 0;
  }
  .block-label {
    margin: 0 0 4px;
    color: var(--copy-muted);
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.20em; text-transform: uppercase;
  }
  .zoom-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .zbtn {
    height: 64px;
    border-radius: var(--radius-button);
    background: rgba(30,41,59,0.55);
    border: 0.5px solid var(--border);
    color: var(--copy);
    font-family: inherit;
    font-weight: 700; font-size: 12px;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  }
  .zbtn svg { width: 20px; height: 20px; }
  .vtc-btn {
    height: 72px;
    border-radius: var(--radius-button);
    background: linear-gradient(180deg, var(--accent), #d8881c);
    border: none;
    color: #1a1206;
    font-family: inherit;
    font-weight: 800; font-size: 14px;
    letter-spacing: 0.14em; text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(245,166,35,0.30);
  }
  .track-stack { display: flex; flex-direction: column; gap: 6px; }
  .track-btn {
    height: 64px; padding: 0 14px;
    border-radius: var(--radius-button);
    background: rgba(30,41,59,0.55);
    border: 0.5px solid var(--border);
    color: var(--copy-soft);
    font-family: inherit;
    font-weight: 700; font-size: 13px;
    text-align: left; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
  }
  .track-btn .tdot {
    width: 9px; height: 9px; border-radius: 50%;
    background: rgba(148,163,184,0.35);
  }
  .track-btn.active {
    border-color: rgba(253,224,71,0.55);
    background: linear-gradient(180deg, rgba(253,224,71,0.10), rgba(8,14,26,0.85));
    color: var(--active);
  }
  .track-btn.active .tdot { background: var(--active); box-shadow: 0 0 8px var(--active); }

  /* PRESETS — dense */
  .presets {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 16px;
    padding: 10px 18px;
  }
  .pre-label { display: flex; flex-direction: column; gap: 2px; min-width: 120px; }
  .pre-label strong { font-size: 13px; font-weight: 800; color: var(--copy); letter-spacing: 0.04em; text-transform: uppercase; }
  .pre-label em { font-style: normal; font-size: 10px; color: var(--copy-muted); font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
  .preset-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .preset-btn {
    height: 80px;
    border-radius: var(--radius-button);
    background: rgba(30,41,59,0.55);
    border: 0.5px solid var(--border);
    color: var(--copy);
    font-family: inherit;
    cursor: pointer;
    padding: 10px 14px;
    display: flex; flex-direction: column; align-items: flex-start; justify-content: space-between;
    text-align: left;
  }
  .preset-btn .pname { font-size: 16px; font-weight: 800; }
  .preset-btn .pmeta {
    font-size: 10px; font-weight: 700; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--copy-muted);
  }
  .preset-btn.set { border-color: rgba(253,224,71,0.55); background: linear-gradient(180deg, rgba(253,224,71,0.10), rgba(8,14,26,0.85)); }
  .preset-btn.set .pname { color: var(--active); }
  .preset-btn.set .pmeta { color: var(--active); }
  .preset-set-tag { display: inline-flex; align-items: center; gap: 6px; }
  .preset-set-tag .pdot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--active); box-shadow: 0 0 8px var(--active);
  }
  .hint {
    text-align: right;
    color: var(--copy-muted);
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.10em; text-transform: uppercase;
    line-height: 1.5;
    min-width: 140px;
  }
  .hint strong { color: var(--copy-soft); font-weight: 800; }
</style>
</head>
<body>
  <div class="frame">

    <!-- HEADER (dense — camera selector lives here) -->
    <div class="hdr gc">
      <button class="hbtn">
        <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
          <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Home
      </button>
      <div class="hsep"></div>
      <div>
        <div class="eyebrow">CH5 Touch Panel</div>
        <div class="room">AA140 — Cameras</div>
      </div>
      <div style="width:12px"></div>
      <div class="cam-seg" role="tablist" aria-label="Camera">
        <button class="cam-seg-btn active">
          IV-CAM-I12-B
          <em>12× zoom</em>
        </button>
        <button class="cam-seg-btn">
          IV-CAM-I20-B
          <em>20× zoom</em>
        </button>
      </div>
      <div class="spacer"></div>
      <div class="pill"><span class="dot"></span>Panel Online</div>
    </div>

    <!-- MAIN -->
    <div class="main">

      <!-- Preview + speed strip -->
      <div class="preview gc">
        <div class="preview-head">
          <div class="panel-label">Preview — IV-CAM-I12-B</div>
          <div class="telemetry">
            <div class="tchip">PTZ</div>
            <div class="tchip"><b>1080p30</b></div>
            <div class="tchip">CH 1</div>
            <div class="tchip">Track <b>VX</b></div>
          </div>
        </div>

        <div class="video-window">
          <div class="live-cap"><span class="live-dot"></span>Live · IV-CAM-I12-B · 1080p30</div>
          <div class="stamp">VX AutoSwitch · Pan 60 · Tilt 45</div>
          <div class="ptz-overlay">
            <button class="ptz-btn ptz-up" aria-label="Tilt up">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5l7 8H5z" fill="currentColor"/></svg>
            </button>
            <button class="ptz-btn ptz-down" aria-label="Tilt down">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 19l-7-8h14z" fill="currentColor"/></svg>
            </button>
            <button class="ptz-btn ptz-left" aria-label="Pan left">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12l8-7v14z" fill="currentColor"/></svg>
            </button>
            <button class="ptz-btn ptz-right" aria-label="Pan right">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 12l-8-7v14z" fill="currentColor"/></svg>
            </button>
          </div>
        </div>

        <div class="speed-strip">
          <div class="speed-card">
            <div class="lab">Pan</div>
            <div class="slider-track">
              <div class="slider-fill" style="width:60%"></div>
              <div class="slider-thumb" style="left:60%"></div>
            </div>
            <div class="read">60</div>
          </div>
          <div class="speed-card">
            <div class="lab">Tilt</div>
            <div class="slider-track">
              <div class="slider-fill" style="width:45%"></div>
              <div class="slider-thumb" style="left:45%"></div>
            </div>
            <div class="read">45</div>
          </div>
        </div>
      </div>

      <!-- RAIL -->
      <div class="rail gc">
        <div>
          <div class="block-label">Zoom</div>
          <div class="zoom-row">
            <button class="zbtn">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="2" fill="none"/>
                <path d="M11 8v6M8 11h6M16.5 16.5L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
              </svg>
              In
            </button>
            <button class="zbtn">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="2" fill="none"/>
                <path d="M8 11h6M16.5 16.5L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
              </svg>
              Out
            </button>
          </div>
        </div>

        <button class="vtc-btn">Send to VTC</button>

        <div>
          <div class="block-label">Tracking Mode</div>
          <div class="track-stack">
            <button class="track-btn"><span class="tdot"></span>People</button>
            <button class="track-btn"><span class="tdot"></span>Group</button>
            <button class="track-btn active"><span class="tdot"></span>VX AutoSwitch</button>
          </div>
        </div>
      </div>
    </div>

    <!-- PRESETS -->
    <div class="presets gc">
      <div class="pre-label">
        <strong>Shot Presets</strong>
        <em>IV-CAM-I12-B</em>
      </div>
      <div class="preset-grid">
        <button class="preset-btn">
          <div class="pname">Default</div>
          <div class="pmeta">Slot 1 · empty</div>
        </button>
        <button class="preset-btn set">
          <div class="pname">Primary</div>
          <div class="preset-set-tag"><span class="pdot"></span><span class="pmeta">Set</span></div>
        </button>
        <button class="preset-btn">
          <div class="pname">Secondary</div>
          <div class="pmeta">Slot 3 · empty</div>
        </button>
      </div>
      <div class="hint">
        <strong>Tap</strong> recall<br>
        <strong>Hold 3s</strong> save
      </div>
    </div>

  </div>
</body>
</html>
