<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MCCCD AA140 — Cameras · V1 Spacious</title>
<style>
  :root {
    --bg-page: #050a14;
    --bg-panel: #0d1b2e;
    --bg-panel-soft: rgba(15, 23, 42, 0.55);
    --border: rgba(148, 163, 184, 0.18);
    --border-strong: rgba(148, 163, 184, 0.32);
    --accent: #f5a623;
    --accent-soft: rgba(245, 166, 35, 0.28);
    --accent-glow: rgba(245, 166, 35, 0.45);
    --active: #fde047;
    --copy: #e2e8f0;
    --copy-soft: #cbd5e1;
    --copy-muted: #94a3b8;
    --success: #22c55e;
    --warn: #fb923c;
    --danger: #ef4444;
    --radius-card: 14px;
    --radius-button: 10px;
    --radius-pill: 999px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #02060d;
    color: var(--copy);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .frame {
    width: 1280px;
    height: 800px;
    background: var(--bg-page);
    border-radius: 18px;
    border: 1px solid rgba(148,163,184,0.08);
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    overflow: hidden;
    display: grid;
    grid-template-rows: 72px 1fr 148px;
    gap: 12px;
    padding: 12px;
  }

  /* glass-card baseline */
  .gc {
    background: linear-gradient(180deg, rgba(13,27,46,0.85), rgba(8,14,26,0.85));
    border: 0.5px solid var(--border);
    border-radius: var(--radius-card);
  }

  /* ─── HEADER ─── */
  .hdr {
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
  }
  .hbtn {
    height: 56px; padding: 0 22px;
    border-radius: var(--radius-button);
    background: rgba(30,41,59,0.55);
    border: 0.5px solid var(--border);
    color: var(--copy-soft);
    font-weight: 700; font-size: 13px;
    letter-spacing: 0.08em; text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 10px;
    cursor: pointer;
    min-width: 64px;
  }
  .hsep { width: 1px; height: 28px; background: var(--border); }
  .room { font-size: 20px; font-weight: 800; line-height: 1; }
  .eyebrow {
    font-size: 10px; font-weight: 700; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--copy-muted);
    margin-bottom: 4px;
  }
  .spacer { flex: 1; }
  .pill {
    height: 44px; padding: 0 16px;
    border-radius: var(--radius-pill);
    background: rgba(34,197,94,0.10);
    border: 0.5px solid rgba(34,197,94,0.30);
    color: #86efac;
    font-weight: 700; font-size: 12px;
    display: inline-flex; align-items: center; gap: 10px;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; box-shadow: 0 0 8px currentColor; }

  /* ─── MAIN — V1 spacious: oversized preview, fat right rail, BIG buttons ─── */
  .main {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 12px;
    min-height: 0;
  }

  /* LEFT: camera tabs above preview */
  .left {
    display: grid;
    grid-template-rows: 96px 1fr;
    gap: 12px;
    min-height: 0;
  }
  .cam-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .cam-tab {
    padding: 16px 20px;
    border-radius: var(--radius-card);
    background: linear-gradient(180deg, rgba(13,27,46,0.85), rgba(8,14,26,0.85));
    border: 0.5px solid var(--border);
    text-align: left;
    color: var(--copy-soft);
    cursor: pointer;
    font-family: inherit;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    min-height: 96px;
  }
  .cam-tab strong { font-size: 18px; font-weight: 800; color: var(--copy); }
  .cam-tab em { font-style: normal; font-size: 12px; color: var(--copy-muted); font-weight: 600; letter-spacing: 0.04em; }
  .cam-tab.active {
    border-color: rgba(253,224,71,0.55);
    background: linear-gradient(180deg, rgba(245,166,35,0.10), rgba(8,14,26,0.85));
    box-shadow: 0 0 0 1px rgba(253,224,71,0.25), 0 8px 24px rgba(245,166,35,0.10);
  }
  .cam-tab.active strong { color: var(--active); }

  /* Preview wrap */
  .preview {
    padding: 14px;
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 10px;
    min-height: 0;
  }
  .panel-label {
    margin: 0;
    color: var(--copy-muted);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.20em;
    text-transform: uppercase;
  }
  .video-window {
    position: relative;
    aspect-ratio: 16 / 9;
    height: 100%;
    width: auto;
    max-width: 100%;
    place-self: center;
    background: #000;
    border-radius: var(--radius-button);
    border: 0.5px solid var(--border-strong);
    overflow: hidden;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 3px),
      radial-gradient(circle at 50% 45%, rgba(40,60,90,0.35) 0%, rgba(0,0,0,0.95) 70%);
  }
  .live-cap {
    position: absolute;
    top: 14px;
    left: 14px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: var(--radius-pill);
    background: rgba(0,0,0,0.55);
    border: 0.5px solid rgba(255,255,255,0.10);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #f1f5f9;
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--danger); box-shadow: 0 0 8px var(--danger); }
  .stamp {
    position: absolute;
    bottom: 14px;
    right: 14px;
    padding: 5px 10px;
    border-radius: 6px;
    background: rgba(0,0,0,0.55);
    border: 0.5px solid rgba(255,255,255,0.08);
    font-size: 11px;
    font-weight: 600;
    color: #cbd5e1;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.06em;
  }

  /* PTZ overlay — V1 SPACIOUS uses 84px buttons on subtle dark discs */
  .ptz-overlay { position: absolute; inset: 0; pointer-events: none; }
  .ptz-btn {
    pointer-events: auto;
    position: absolute;
    width: 84px;
    height: 84px;
    color: #fff;
    background: rgba(0,0,0,0.40);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 50%;
    backdrop-filter: blur(6px);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .ptz-up    { top: 18px;    left: 50%; transform: translateX(-50%); }
  .ptz-down  { bottom: 18px; left: 50%; transform: translateX(-50%); }
  .ptz-left  { left: 18px;   top: 50%;  transform: translateY(-50%); }
  .ptz-right { right: 18px;  top: 50%;  transform: translateY(-50%); }
  .ptz-btn svg { width: 36px; height: 36px; }

  /* RIGHT rail: speeds → zoom → VTC → tracking */
  .rail {
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-height: 0;
  }
  .block-label {
    margin: 0 0 6px;
    color: var(--copy-muted);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .speed-row {
    display: grid;
    grid-template-columns: 1fr 44px;
    align-items: center;
    gap: 12px;
  }
  .slider-track {
    position: relative;
    height: 28px;
    border-radius: var(--radius-pill);
    background: rgba(30,41,59,0.55);
    border: 0.5px solid var(--border);
    overflow: hidden;
  }
  .slider-fill {
    position: absolute; inset: 0 auto 0 0;
    background: linear-gradient(90deg, rgba(245,166,35,0.55), rgba(245,166,35,0.85));
    border-right: 1.5px solid var(--accent);
  }
  .slider-thumb {
    position: absolute;
    top: 50%;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid var(--accent);
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    transform: translate(-50%, -50%);
  }
  .speed-readout {
    text-align: right;
    font-weight: 800;
    font-size: 18px;
    color: var(--copy);
    font-variant-numeric: tabular-nums;
  }

  .zoom-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .zbtn {
    height: 72px;
    border-radius: var(--radius-button);
    background: rgba(30,41,59,0.55);
    border: 0.5px solid var(--border);
    color: var(--copy);
    font-family: inherit;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .zbtn svg { width: 24px; height: 24px; }

  .vtc-btn {
    height: 80px;
    border-radius: var(--radius-button);
    background: linear-gradient(180deg, var(--accent), #d8881c);
    border: none;
    color: #1a1206;
    font-family: inherit;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(245,166,35,0.30);
  }

  .tracking-stack { display: flex; flex-direction: column; gap: 8px; }
  .track-btn {
    height: 64px;
    padding: 0 18px;
    border-radius: var(--radius-button);
    background: rgba(30,41,59,0.55);
    border: 0.5px solid var(--border);
    color: var(--copy-soft);
    font-family: inherit;
    font-weight: 700;
    font-size: 14px;
    text-align: left;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .track-btn .tdot {
    width: 10px; height: 10px; border-radius: 50%;
    background: rgba(148,163,184,0.35);
  }
  .track-btn.active {
    border-color: rgba(253,224,71,0.55);
    background: linear-gradient(180deg, rgba(253,224,71,0.10), rgba(8,14,26,0.85));
    color: var(--active);
    box-shadow: 0 0 0 1px rgba(253,224,71,0.25);
  }
  .track-btn.active .tdot { background: var(--active); box-shadow: 0 0 10px var(--active); }

  /* ─── PRESETS row ─── */
  .presets {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 20px;
    padding: 14px 22px;
  }
  .presets-label-block {
    display: flex; flex-direction: column; gap: 4px;
    min-width: 132px;
  }
  .presets-label-block strong { font-size: 15px; font-weight: 800; color: var(--copy); }
  .presets-label-block em { font-style: normal; font-size: 11px; color: var(--copy-muted); font-weight: 600; letter-spacing: 0.10em; text-transform: uppercase; }
  .preset-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }
  .preset-btn {
    height: 108px;
    border-radius: var(--radius-card);
    background: rgba(30,41,59,0.55);
    border: 0.5px solid var(--border);
    color: var(--copy);
    font-family: inherit;
    cursor: pointer;
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: space-between;
    text-align: left;
  }
  .preset-btn .pname { font-size: 18px; font-weight: 800; letter-spacing: 0.02em; }
  .preset-btn .pmeta {
    font-size: 10px; font-weight: 700; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--copy-muted);
  }
  .preset-btn.set {
    border-color: rgba(253,224,71,0.55);
    background: linear-gradient(180deg, rgba(253,224,71,0.10), rgba(8,14,26,0.85));
  }
  .preset-btn.set .pname { color: var(--active); }
  .preset-btn.set .pmeta { color: var(--active); }
  .preset-set-tag {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--active);
    font-size: 10px; font-weight: 800;
    letter-spacing: 0.18em; text-transform: uppercase;
  }
  .preset-set-tag .pdot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--active); box-shadow: 0 0 10px var(--active);
  }

  .hint-block {
    text-align: right;
    color: var(--copy-muted);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    line-height: 1.5;
    min-width: 156px;
  }
  .hint-block strong { color: var(--copy-soft); font-weight: 800; }
</style>
</head>
<body>
  <div class="frame">

    <!-- HEADER -->
    <div class="hdr gc">
      <button class="hbtn">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
          <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Home
      </button>
      <div class="hsep"></div>
      <div>
        <div class="eyebrow">CH5 Touch Panel</div>
        <div class="room">AA140 — Cameras</div>
      </div>
      <div class="spacer"></div>
      <div class="pill"><span class="dot"></span>Panel Online</div>
    </div>

    <!-- MAIN -->
    <div class="main">

      <div class="left">
        <!-- Camera selector tabs -->
        <div class="cam-tabs">
          <button class="cam-tab active">
            <strong>IV-CAM-I12-B</strong>
            <em>Intelligent Video · 12× Optical Zoom</em>
          </button>
          <button class="cam-tab">
            <strong>IV-CAM-I20-B</strong>
            <em>Intelligent Video · 20× Optical Zoom</em>
          </button>
        </div>

        <!-- Preview -->
        <div class="preview gc">
          <div class="panel-label">Preview — IV-CAM-I12-B (12× Optical Zoom)</div>
          <div class="video-window">
            <div class="live-cap"><span class="live-dot"></span>Live · IV-CAM-I12-B · 1080p30</div>
            <div class="stamp">VX AutoSwitch · Pan 60 · Tilt 45</div>
            <div class="ptz-overlay">
              <button class="ptz-btn ptz-up" aria-label="Tilt up">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5l7 8H5z" fill="currentColor"/></svg>
              </button>
              <button class="ptz-btn ptz-down" aria-label="Tilt down">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 19l-7-8h14z" fill="currentColor"/></svg>
              </button>
              <button class="ptz-btn ptz-left" aria-label="Pan left">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12l8-7v14z" fill="currentColor"/></svg>
              </button>
              <button class="ptz-btn ptz-right" aria-label="Pan right">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 12l-8-7v14z" fill="currentColor"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- RIGHT RAIL -->
      <div class="rail gc">
        <div>
          <div class="block-label">Pan Speed</div>
          <div class="speed-row">
            <div class="slider-track">
              <div class="slider-fill" style="width:60%"></div>
              <div class="slider-thumb" style="left:60%"></div>
            </div>
            <div class="speed-readout">60</div>
          </div>
        </div>
        <div>
          <div class="block-label">Tilt Speed</div>
          <div class="speed-row">
            <div class="slider-track">
              <div class="slider-fill" style="width:45%"></div>
              <div class="slider-thumb" style="left:45%"></div>
            </div>
            <div class="speed-readout">45</div>
          </div>
        </div>

        <div>
          <div class="block-label">Zoom</div>
          <div class="zoom-row">
            <button class="zbtn">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="2" fill="none"/>
                <path d="M11 8v6M8 11h6M16.5 16.5L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
              </svg>
              In
            </button>
            <button class="zbtn">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="2" fill="none"/>
                <path d="M8 11h6M16.5 16.5L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
              </svg>
              Out
            </button>
          </div>
        </div>

        <button class="vtc-btn">Send to VTC</button>

        <div>
          <div class="block-label">Tracking Mode</div>
          <div class="tracking-stack">
            <button class="track-btn"><span class="tdot"></span>People</button>
            <button class="track-btn"><span class="tdot"></span>Group</button>
            <button class="track-btn active"><span class="tdot"></span>VX AutoSwitch</button>
          </div>
        </div>
      </div>
    </div>

    <!-- PRESETS -->
    <div class="presets gc">
      <div class="presets-label-block">
        <strong>Shot Presets</strong>
        <em>3 slots per camera</em>
      </div>
      <div class="preset-grid">
        <button class="preset-btn">
          <div class="pname">Default</div>
          <div class="pmeta">Slot 1 · empty</div>
        </button>
        <button class="preset-btn set">
          <div class="pname">Primary</div>
          <div class="preset-set-tag"><span class="pdot"></span>Set</div>
        </button>
        <button class="preset-btn">
          <div class="pname">Secondary</div>
          <div class="pmeta">Slot 3 · empty</div>
        </button>
      </div>
      <div class="hint-block">
        <strong>Tap</strong> to recall<br>
        <strong>Hold 3s</strong> to save
      </div>
    </div>

  </div>
</body>
</html>
