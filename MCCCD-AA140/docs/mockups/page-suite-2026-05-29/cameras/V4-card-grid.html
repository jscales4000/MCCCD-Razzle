<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MCCCD AA140 — Cameras · V4 Card-Grid</title>
<style>
  :root {
    --bg-page: #050a14;
    --bg-panel: #0d1b2e;
    --bg-panel-soft: rgba(15, 23, 42, 0.55);
    --border: rgba(148, 163, 184, 0.18);
    --border-strong: rgba(148, 163, 184, 0.32);
    --accent: #f5a623;
    --accent-soft: rgba(245, 166, 35, 0.28);
    --accent-glow: rgba(245, 166, 35, 0.45);
    --active: #fde047;
    --copy: #e2e8f0;
    --copy-soft: #cbd5e1;
    --copy-muted: #94a3b8;
    --success: #22c55e;
    --warn: #fb923c;
    --danger: #ef4444;
    --radius-card: 14px;
    --radius-button: 10px;
    --radius-pill: 999px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #02060d;
    color: var(--copy);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .frame {
    width: 1280px;
    height: 800px;
    background: var(--bg-page);
    border-radius: 18px;
    border: 1px solid rgba(148,163,184,0.08);
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    overflow: hidden;
    display: grid;
    grid-template-rows: 72px 1fr;
    gap: 10px;
    padding: 12px;
  }
  .gc {
    background: linear-gradient(180deg, rgba(13,27,46,0.85), rgba(8,14,26,0.85));
    border: 0.5px solid var(--border);
    border-radius: var(--radius-card);
  }

  /* HEADER */
  .hdr { display: flex; align-items: center; gap: 16px; padding: 0 20px; }
  .hbtn {
    height: 56px; padding: 0 22px; min-width: 64px;
    border-radius: var(--radius-button);
    background: rgba(30,41,59,0.55);
    border: 0.5px solid var(--border);
    color: var(--copy-soft);
    font-family: inherit;
    font-weight: 700; font-size: 13px;
    letter-spacing: 0.08em; text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 10px;
    cursor: pointer;
  }
  .hsep { width: 1px; height: 28px; background: var(--border); }
  .room { font-size: 20px; font-weight: 800; line-height: 1; }
  .eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--copy-muted); margin-bottom: 4px; }
  .spacer { flex: 1; }
  .pill {
    height: 44px; padding: 0 16px;
    border-radius: var(--radius-pill);
    background: rgba(34,197,94,0.10);
    border: 0.5px solid rgba(34,197,94,0.30);
    color: #86efac;
    font-weight: 700; font-size: 12px;
    display: inline-flex; align-items: center; gap: 10px;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; box-shadow: 0 0 8px currentColor; }

  /* MAIN — V4 card-grid: 4 equal quadrants. Top row: preview / camera+VTC. Bottom row: tracking / presets. Speeds inline on preview card. */
  .main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 10px;
    min-height: 0;
  }

  .card-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .block-label {
    margin: 0;
    color: var(--copy-muted);
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.22em; text-transform: uppercase;
  }
  .badge {
    height: 26px; padding: 0 10px;
    border-radius: var(--radius-pill);
    background: rgba(30,41,59,0.65);
    border: 0.5px solid var(--border);
    color: var(--copy-soft);
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.10em; text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .badge.live {
    background: rgba(239,68,68,0.10);
    border-color: rgba(239,68,68,0.30);
    color: #fca5a5;
  }
  .badge .ldot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; box-shadow: 0 0 8px currentColor; }

  /* Q1: Preview card (top-left) */
  .q-preview {
    padding: 12px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 8px;
    min-height: 0;
  }
  .video-window {
    position: relative;
    aspect-ratio: 16 / 9;
    height: 100%;
    width: auto;
    max-width: 100%;
    place-self: center;
    background: #000;
    border-radius: var(--radius-button);
    border: 0.5px solid var(--border-strong);
    overflow: hidden;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 3px),
      radial-gradient(circle at 50% 40%, rgba(40,60,90,0.40) 0%, rgba(0,0,0,0.95) 70%);
  }
  .live-cap {
    position: absolute; top: 12px; left: 12px;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 5px 10px; border-radius: var(--radius-pill);
    background: rgba(0,0,0,0.55); border: 0.5px solid rgba(255,255,255,0.10);
    font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
    color: #f1f5f9;
  }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--danger); box-shadow: 0 0 8px var(--danger); }
  .stamp {
    position: absolute; bottom: 12px; right: 12px;
    padding: 4px 9px; border-radius: 6px;
    background: rgba(0,0,0,0.55); border: 0.5px solid rgba(255,255,255,0.08);
    font-size: 10px; font-weight: 600; color: #cbd5e1;
    font-variant-numeric: tabular-nums; letter-spacing: 0.06em;
  }
  .ptz-overlay { position: absolute; inset: 0; pointer-events: none; }
  .ptz-btn {
    pointer-events: auto;
    position: absolute;
    width: 72px; height: 72px;
    color: #fff;
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(255,255,255,0.20);
    border-radius: 50%;
    backdrop-filter: blur(6px);
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .ptz-up    { top: 12px;    left: 50%; transform: translateX(-50%); }
  .ptz-down  { bottom: 12px; left: 50%; transform: translateX(-50%); }
  .ptz-left  { left: 12px;   top: 50%;  transform: translateY(-50%); }
  .ptz-right { right: 12px;  top: 50%;  transform: translateY(-50%); }
  .ptz-btn svg { width: 30px; height: 30px; }

  .speed-strip {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .speed-card {
    padding: 8px 12px;
    border-radius: 10px;
    background: rgba(15,23,42,0.55);
    border: 0.5px solid var(--border);
    display: grid;
    grid-template-columns: 38px 1fr 32px;
    align-items: center;
    gap: 10px;
    min-height: 48px;
  }
  .speed-card .lab {
    font-size: 10px; font-weight: 800; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--copy-muted);
  }
  .slider-track {
    position: relative; height: 12px;
    border-radius: var(--radius-pill);
    background: rgba(30,41,59,0.7);
    border: 0.5px solid var(--border);
  }
  .slider-fill {
    position: absolute; inset: 0 auto 0 0;
    border-radius: var(--radius-pill);
    background: linear-gradient(90deg, rgba(245,166,35,0.55), rgba(245,166,35,0.85));
  }
  .slider-thumb {
    position: absolute; top: 50%;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid var(--accent);
    box-shadow: 0 2px 6px rgba(0,0,0,0.6);
    transform: translate(-50%, -50%);
  }
  .speed-card .read {
    font-weight: 800; font-size: 15px; color: var(--copy);
    font-variant-numeric: tabular-nums; text-align: right;
  }

  /* Q2: Camera + Zoom + VTC (top-right) */
  .q-route {
    padding: 18px;
    display: grid;
    grid-template-rows: auto auto auto auto;
    gap: 14px;
    min-height: 0;
  }
  .cam-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .cam-card {
    height: 96px;
    padding: 14px 16px;
    border-radius: var(--radius-card);
    background: rgba(15,23,42,0.55);
    border: 0.5px solid var(--border);
    text-align: left;
    color: var(--copy-soft);
    cursor: pointer;
    font-family: inherit;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
  }
  .cam-card strong { font-size: 16px; font-weight: 800; color: var(--copy); }
  .cam-card em { font-style: normal; font-size: 11px; color: var(--copy-muted); font-weight: 600; letter-spacing: 0.06em; }
  .cam-card.active {
    border-color: rgba(253,224,71,0.55);
    background: linear-gradient(180deg, rgba(253,224,71,0.10), rgba(8,14,26,0.85));
  }
  .cam-card.active strong { color: var(--active); }

  .zoom-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .zbtn {
    height: 72px;
    border-radius: var(--radius-button);
    background: rgba(30,41,59,0.55);
    border: 0.5px solid var(--border);
    color: var(--copy);
    font-family: inherit;
    font-weight: 700; font-size: 13px;
    letter-spacing: 0.10em; text-transform: uppercase;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  }
  .zbtn svg { width: 22px; height: 22px; }

  .vtc-btn {
    height: 72px;
    border-radius: var(--radius-button);
    background: linear-gradient(180deg, var(--accent), #d8881c);
    border: none;
    color: #1a1206;
    font-family: inherit;
    font-weight: 800; font-size: 15px;
    letter-spacing: 0.14em; text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(245,166,35,0.30);
  }

  /* Q3: Tracking (bottom-left) */
  .q-track {
    padding: 18px;
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 12px;
    min-height: 0;
  }
  .track-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }
  .track-btn {
    border-radius: var(--radius-card);
    background: rgba(30,41,59,0.55);
    border: 0.5px solid var(--border);
    color: var(--copy-soft);
    font-family: inherit;
    font-weight: 700; font-size: 14px;
    text-align: center;
    cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px;
    padding: 14px 10px;
  }
  .track-btn svg { width: 36px; height: 36px; color: var(--copy-muted); }
  .track-btn.active {
    border-color: rgba(253,224,71,0.55);
    background: linear-gradient(180deg, rgba(253,224,71,0.10), rgba(8,14,26,0.85));
    color: var(--active);
  }
  .track-btn.active svg { color: var(--active); }

  /* Q4: Presets (bottom-right) */
  .q-presets {
    padding: 18px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 12px;
    min-height: 0;
  }
  .preset-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }
  .preset-btn {
    border-radius: var(--radius-card);
    background: rgba(30,41,59,0.55);
    border: 0.5px solid var(--border);
    color: var(--copy);
    font-family: inherit;
    cursor: pointer;
    padding: 14px;
    display: flex; flex-direction: column; align-items: flex-start; justify-content: space-between;
    text-align: left;
    min-height: 120px;
  }
  .preset-btn .num {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: rgba(15,23,42,0.7);
    border: 0.5px solid var(--border);
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 12px;
    color: var(--copy-soft);
    font-variant-numeric: tabular-nums;
  }
  .preset-btn .pname { font-size: 17px; font-weight: 800; letter-spacing: 0.02em; }
  .preset-btn .pmeta { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--copy-muted); }
  .preset-btn.set { border-color: rgba(253,224,71,0.55); background: linear-gradient(180deg, rgba(253,224,71,0.10), rgba(8,14,26,0.85)); }
  .preset-btn.set .pname { color: var(--active); }
  .preset-btn.set .pmeta { color: var(--active); }
  .preset-btn.set .num { background: rgba(253,224,71,0.18); color: var(--active); border-color: rgba(253,224,71,0.40); }
  .hint {
    margin: 0;
    color: var(--copy-muted);
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.16em; text-transform: uppercase;
    text-align: center;
  }
  .hint strong { color: var(--copy-soft); font-weight: 800; }
</style>
</head>
<body>
  <div class="frame">

    <div class="hdr gc">
      <button class="hbtn">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
          <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Home
      </button>
      <div class="hsep"></div>
      <div>
        <div class="eyebrow">CH5 Touch Panel</div>
        <div class="room">AA140 — Cameras</div>
      </div>
      <div class="spacer"></div>
      <div class="pill"><span class="dot"></span>Panel Online</div>
    </div>

    <div class="main">

      <!-- Q1: Preview -->
      <div class="q-preview gc">
        <div class="card-head">
          <div class="block-label">Preview · IV-CAM-I12-B</div>
          <div class="badge live"><span class="ldot"></span>Live · 1080p30</div>
        </div>
        <div class="video-window">
          <div class="live-cap"><span class="live-dot"></span>Live · IV-CAM-I12-B</div>
          <div class="stamp">VX AutoSwitch · Pan 60 · Tilt 45</div>
          <div class="ptz-overlay">
            <button class="ptz-btn ptz-up" aria-label="Tilt up">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5l7 8H5z" fill="currentColor"/></svg>
            </button>
            <button class="ptz-btn ptz-down" aria-label="Tilt down">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 19l-7-8h14z" fill="currentColor"/></svg>
            </button>
            <button class="ptz-btn ptz-left" aria-label="Pan left">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12l8-7v14z" fill="currentColor"/></svg>
            </button>
            <button class="ptz-btn ptz-right" aria-label="Pan right">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 12l-8-7v14z" fill="currentColor"/></svg>
            </button>
          </div>
        </div>
        <div class="speed-strip">
          <div class="speed-card">
            <div class="lab">Pan</div>
            <div class="slider-track">
              <div class="slider-fill" style="width:60%"></div>
              <div class="slider-thumb" style="left:60%"></div>
            </div>
            <div class="read">60</div>
          </div>
          <div class="speed-card">
            <div class="lab">Tilt</div>
            <div class="slider-track">
              <div class="slider-fill" style="width:45%"></div>
              <div class="slider-thumb" style="left:45%"></div>
            </div>
            <div class="read">45</div>
          </div>
        </div>
      </div>

      <!-- Q2: Camera + Zoom + VTC -->
      <div class="q-route gc">
        <div class="card-head"><div class="block-label">Camera</div></div>
        <div class="cam-grid">
          <button class="cam-card active">
            <strong>IV-CAM-I12-B</strong>
            <em>12× Optical Zoom · IV Intelligent</em>
          </button>
          <button class="cam-card">
            <strong>IV-CAM-I20-B</strong>
            <em>20× Optical Zoom · IV Intelligent</em>
          </button>
        </div>

        <div class="card-head" style="margin-top:4px"><div class="block-label">Zoom</div></div>
        <div class="zoom-grid">
          <button class="zbtn">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="2" fill="none"/>
              <path d="M11 8v6M8 11h6M16.5 16.5L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
            </svg>
            Zoom In
          </button>
          <button class="zbtn">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="2" fill="none"/>
              <path d="M8 11h6M16.5 16.5L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
            </svg>
            Zoom Out
          </button>
        </div>

        <button class="vtc-btn">Send to VTC</button>
      </div>

      <!-- Q3: Tracking -->
      <div class="q-track gc">
        <div class="card-head">
          <div class="block-label">Tracking Mode</div>
          <div class="badge">VX AutoSwitch · Active</div>
        </div>
        <div class="track-grid">
          <button class="track-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <circle cx="12" cy="8" r="3.2"/>
              <path d="M5 20c1.5-3.5 4-5 7-5s5.5 1.5 7 5"/>
            </svg>
            People
          </button>
          <button class="track-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <circle cx="8" cy="9" r="2.4"/>
              <circle cx="16" cy="9" r="2.4"/>
              <path d="M2 20c1-3 3-4.5 6-4.5s5 1.5 6 4.5"/>
              <path d="M12 20c1-3 3-4.5 6-4.5s4 1.5 4 4.5"/>
            </svg>
            Group
          </button>
          <button class="track-btn active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <rect x="3" y="6" width="18" height="12" rx="2"/>
              <path d="M8 12h8M8 9h5M8 15h5"/>
              <circle cx="18" cy="9" r="1.2" fill="currentColor"/>
            </svg>
            VX AutoSwitch
          </button>
        </div>
      </div>

      <!-- Q4: Presets -->
      <div class="q-presets gc">
        <div class="card-head">
          <div class="block-label">Shot Presets · IV-CAM-I12-B</div>
        </div>
        <div class="preset-grid">
          <button class="preset-btn">
            <div class="num">1</div>
            <div class="pname">Default</div>
            <div class="pmeta">empty</div>
          </button>
          <button class="preset-btn set">
            <div class="num">2</div>
            <div class="pname">Primary</div>
            <div class="pmeta">Set</div>
          </button>
          <button class="preset-btn">
            <div class="num">3</div>
            <div class="pname">Secondary</div>
            <div class="pmeta">empty</div>
          </button>
        </div>
        <p class="hint"><strong>Tap</strong> to recall · <strong>Hold 3 seconds</strong> to save</p>
      </div>

    </div>
  </div>
</body>
</html>
